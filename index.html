<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 介面還原版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif; display: flex; flex-direction: column; align-items: center; }
    
    /* 上方控制列 */
    .controls { display: flex; gap: 10px; padding: 20px 10px; width: 100%; justify-content: center; }
    .btn { background: #333; color: white; padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; }
    #upload-input { display: none; }

    /* 四宮格儀表板 */
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; margin-bottom: 15px; }
    .data-card { 
      background: #222; padding: 15px; border-radius: 12px; text-align: center; 
      border: 1px solid #00FF00; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
    }
    .data-label { font-size: 13px; color: #aaa; margin-bottom: 5px; }
    .data-value { font-size: 24px; font-weight: bold; color: #fff; }

    /* 影片區域 */
    .canvas-container { position: relative; width: 92%; max-width: 640px; border-radius: 20px; overflow: hidden; border: 2px solid #333; }
    canvas { width: 100%; display: block; background: #000; }
    video { display: none; }

    /* 載入遮罩 - 匹配截圖 */
    #loading-overlay {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.8); padding: 20px; border-radius: 15px;
      border: 2px solid #00FF00; text-align: center; z-index: 100;
      width: 60%; display: none;
    }
    .spin { animation: rotation 2s infinite linear; display: inline-block; }
    @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(359deg); } }

    .release-hint { position: absolute; top: 20px; width: 100%; text-align: center; color: #FF3B30; font-size: 32px; font-weight: bold; pointer-events: none; }
  </style>
</head>
<body>

  <div class="controls">
    <button class="btn" onclick="switchCamera()">🔄 切換鏡頭</button>
    <label class="btn" for="upload-input">📁 上傳影片</label>
    <input type="file" id="upload-input" accept="video/*" onchange="loadVideo(event)">
    <button class="btn" onclick="location.reload()"><span style="color:red">●</span> 即時模式</button>
  </div>
  
  <div class="dashboard">
    <div class="data-card"><div class="data-label">後手肘角度</div><div id="elbow-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">軀幹垂直度</div><div id="torso-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">左膝角度</div><div id="lknee-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">右膝角度</div><div id="rknee-val" class="data-value">--°</div></div>
  </div>

  <div class="canvas-container">
    <div id="loading-overlay">
      <div class="spin" style="font-size: 30px;">⚙️</div>
      <div style="margin-top: 10px; font-weight: bold;">AI 高速分析中...</div>
      <div style="font-size: 12px; color: #aaa;">請稍候數秒</div>
    </div>
    <div id="release-msg" class="release-hint"></div>
    <video class="input_video" playsinline muted crossorigin="anonymous"></video>
    <canvas class="output_canvas"></canvas>
  </div>

  <script>
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const loadingOverlay = document.getElementById('loading-overlay');
    const releaseMsg = document.getElementById('release-msg');
    
    let camera = null;
    let currentFacingMode = "environment";
    let lastResults = null;
    let isProcessing = false;

    function calculateAngle(a, b, c) {
      if(!a || !b || !c) return 0;
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return Math.round(angle);
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true, minDetectionConfidence: 0.5, minTrackingConfidence: 0.5 });

    pose.onResults((results) => {
      lastResults = results;
      if (isProcessing) {
        loadingOverlay.style.display = 'none';
        isProcessing = false;
      }
      updateUI(results.poseLandmarks);
    });

    function updateUI(lm) {
      if (!lm) return;
      
      // 1. 後手肘 (依肩部高度判定)
      const isRight = lm[14].y < lm[13].y;
      const elbow = calculateAngle(lm[isRight?12:11], lm[isRight?14:13], lm[isRight?16:15]);
      
      // 2. 軀幹角度
      const sMid = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2 };
      const hMid = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2 };
      const torso = calculateAngle({x: sMid.x, y: 0}, sMid, hMid);

      // 3. 膝蓋角度
      const lKnee = calculateAngle(lm[23], lm[25], lm[27]);
      const rKnee = calculateAngle(lm[24], lm[26], lm[28]);

      document.getElementById('elbow-val').innerText = elbow + "°";
      document.getElementById('torso-val').innerText = torso + "°";
      document.getElementById('lknee-val').innerText = lKnee + "°";
      document.getElementById('rknee-val').innerText = rKnee + "°";
    }

    function drawLoop() {
      if (videoElement.readyState >= 2) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

        if (lastResults && lastResults.poseLandmarks) {
          drawConnectors(canvasCtx, lastResults.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
          drawLandmarks(canvasCtx, lastResults.poseLandmarks, {color: '#FFFFFF', radius: 1});
        }
        canvasCtx.restore();
        pose.send({ image: videoElement });
      }
      requestAnimationFrame(drawLoop);
    }

    async function loadVideo(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (camera) { await camera.stop(); camera = null; }
      
      isProcessing = true;
      loadingOverlay.style.display = 'block';
      videoElement.src = URL.createObjectURL(file);
      videoElement.onloadeddata = () => videoElement.play();
    }

    async function startCamera() {
      camera = new Camera(videoElement, {
        onFrame: async () => {},
        facingMode: currentFacingMode,
        width: 640, height: 480
      });
      camera.start();
      drawLoop();
    }

    window.onload = startCamera;

    function switchCamera() {
      currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
      startCamera();
    }
  </script>
</body>
</html>
