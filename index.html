<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 輕量修正版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
    .header-controls { padding: 10px; display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; width: 100%; background: #1a1a1a; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #333; }
    .btn { background: #222; color: #00FF00; padding: 10px 14px; border-radius: 6px; border: 1px solid #00FF00; cursor: pointer; font-size: 13px; font-weight: bold; }
    .btn-danger { border-color: #ff4444; color: #ff4444; }
    .comparison-container { display: flex; flex-direction: column; gap: 15px; width: 95%; margin-top: 10px; align-items: center; }
    .video-slot { width: 100%; max-width: 450px; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; }
    .canvas-box { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; overflow: hidden; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    video { display: none; }
    .slot-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .mini-card { background: #000; padding: 8px; border-radius: 5px; text-align: center; border: 1px solid #444; }
    .mini-label { font-size: 11px; color: #888; }
    .mini-val { font-size: 16px; color: #00FF00; font-weight: bold; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
    .bar-bg { width: 70%; height: 8px; background: #333; border-radius: 4px; margin-top: 12px; overflow: hidden; }
    .bar-fill { width: 0%; height: 100%; background: #00FF00; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header-controls">
    <button class="btn" onclick="activateLiveMode()">📸 鏡頭</button>
    <label class="btn" for="upload-A">📁 影片 A</label>
    <input type="file" id="upload-A" accept="video/*" hidden onchange="handleFile(event, 'A')">
    <label class="btn" for="upload-B">📁 影片 B</label>
    <input type="file" id="upload-B" accept="video/*" hidden onchange="handleFile(event, 'B')">
    <button class="btn btn-danger" onclick="location.reload()">🔄 重設</button>
  </div>

  <div class="comparison-container">
    <div class="video-slot" id="slot-A">
      <div class="canvas-box">
        <div class="overlay" id="overlay-A"><div id="msg-A" style="color:#00FF00">讀取中...</div><div class="bar-bg"><div class="bar-fill" id="fill-A"></div></div></div>
        <video id="video-A" playsinline muted crossorigin="anonymous"></video>
        <canvas id="canvas-A"></canvas>
      </div>
      <div class="slot-dash">
        <div class="mini-card"><div class="mini-label">後手肘</div><div id="elbow-A" class="mini-val">--°</div></div>
        <div class="mini-card"><div class="mini-label">前肩</div><div id="f-shoulder-A" class="mini-val">--°</div></div>
        <button class="btn" style="grid-column: span 2;" onclick="resetBaseline('A')">🎯 鎖定基準</button>
      </div>
    </div>

    <div class="video-slot hidden" id="slot-B">
      <div class="canvas-box">
        <div class="overlay" id="overlay-B"><div id="msg-B" style="color:#00FF00">讀取中...</div><div class="bar-bg"><div class="bar-fill" id="fill-B"></div></div></div>
        <video id="video-B" playsinline muted crossorigin="anonymous"></video>
        <canvas id="canvas-B"></canvas>
      </div>
      <div class="slot-dash">
        <div class="mini-card"><div class="mini-label">後手肘</div><div id="elbow-B" class="mini-val">--°</div></div>
        <div class="mini-card"><div class="mini-label">前肩</div><div id="f-shoulder-B" class="mini-val">--°</div></div>
      </div>
    </div>
  </div>

  <script>
    const slots = {
      A: { vid: document.getElementById('video-A'), cvs: document.getElementById('canvas-A'), ctx: document.getElementById('canvas-A').getContext('2d'), ovl: document.getElementById('overlay-A'), fill: document.getElementById('fill-A') },
      B: { vid: document.getElementById('video-B'), cvs: document.getElementById('canvas-B'), ctx: document.getElementById('canvas-B').getContext('2d'), ovl: document.getElementById('overlay-B'), fill: document.getElementById('fill-B') }
    };

    let pose;
    let isLive = false;
    let aiBusy = false;
    let currentTarget = null;

    async function init() {
      pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
      pose.setOptions({ modelComplexity: 0, smoothLandmarks: true }); // 改用 Complexity 0 以換取流暢度
      pose.onResults((res) => {
        if (currentTarget && res.poseLandmarks) {
          updateUI(currentTarget, res.poseLandmarks);
          drawPose(currentTarget, res.poseLandmarks);
        }
        aiBusy = false;
      });
    }

    function getAng(p1, p2, p3) {
      const r = Math.atan2(p3.y-p2.y, p3.x-p2.x) - Math.atan2(p1.y-p2.y, p1.x-p2.x);
      let a = Math.abs(r * 180 / Math.PI);
      return Math.round(a > 180 ? 360 - a : a);
    }

    function updateUI(id, lm) {
      const isR = lm[14].y < lm[13].y; 
      const drawE = isR ? 14 : 13;
      const drawS = isR ? 12 : 11;
      const drawW = isR ? 16 : 15;
      document.getElementById(`elbow-${id}`).innerText = getAng(lm[drawS], lm[drawE], lm[drawW]) + "°";
      document.getElementById(`f-shoulder-${id}`).innerText = getAng(lm[isR?13:14], lm[isR?11:12], lm[isR?23:24]) + "°";
    }

    function drawPose(id, lm) {
      const s = slots[id];
      s.ctx.clearRect(0, 0, s.cvs.width, s.cvs.height);
      s.ctx.drawImage(s.vid, 0, 0, s.cvs.width, s.cvs.height);
      drawConnectors(s.ctx, lm, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
    }

    async function handleFile(e, id) {
      const file = e.target.files[0];
      if (!file) return;
      isLive = false;
      const s = slots[id];
      if (id === 'B') document.getElementById('slot-B').classList.remove('hidden');
      
      s.ovl.style.display = 'flex';
      s.vid.src = URL.createObjectURL(file);
      await s.vid.play(); // 先嘗試播放以觸發瀏覽器解碼
      s.vid.pause();

      const duration = s.vid.duration;
      for (let t = 0; t <= duration; t += 0.5) { // 增加間隔至 0.5s
        s.vid.currentTime = t;
        await new Promise(r => s.vid.onseeked = r);
        currentTarget = id;
        aiBusy = true;
        await pose.send({ image: s.vid });
        s.fill.style.width = (t / duration * 100) + "%";
        document.getElementById(`msg-${id}`).innerText = `分析中 ${Math.round(t/duration*100)}%`;
      }
      s.ovl.style.display = 'none';
      s.vid.currentTime = 0;
    }

    function resetBaseline(id) { alert("基準已設定"); }

    window.onload = async () => { 
      await init(); 
      console.log("AI Ready"); 
    };
  </script>
</body>
</html>
