<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 極速分析版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .controls { display: flex; gap: 10px; padding: 15px; flex-wrap: wrap; justify-content: center; background: #222; width: 100%; border-bottom: 2px solid #00FF00; }
    button, label { background: #333; color: #00FF00; padding: 12px 18px; border-radius: 8px; border: 1px solid #00FF00; cursor: pointer; font-size: 14px; font-weight: bold; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 95%; max-width: 600px; margin: 15px 0; }
    .data-card { background: #2a2a2a; padding: 12px; border-radius: 10px; text-align: center; border-left: 4px solid #00FF00; }
    .data-label { font-size: 12px; color: #aaa; }
    .data-value { font-size: 20px; font-weight: bold; }
    .canvas-container { position: relative; width: 95%; max-width: 640px; }
    canvas { width: 100%; border-radius: 12px; background: #000; }
    video { display: none; }
    #upload-input { display: none; }
    .status-msg { position: absolute; top: 10px; left: 10px; font-weight: bold; color: #FF3B30; z-index: 5; }
  </style>
</head>
<body>

  <div class="controls">
    <button onclick="switchCamera()">🔄 切換鏡頭</button>
    <label for="upload-input">📁 上傳分析影片</label>
    <input type="file" id="upload-input" accept="video/*" onchange="loadVideo(event)">
    <button onclick="location.reload()">🔴 即時模式</button>
  </div>
  
  <div class="dashboard">
    <div class="data-card"><div class="data-label">後手肘角度</div><div id="elbow-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">開弓直線度</div><div id="align-val" class="data-value">--%</div></div>
    <div class="data-card"><div class="data-label">軀幹垂直</div><div id="torso-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">頭部狀態</div><div id="head-val" class="data-value">--</div></div>
  </div>

  <div class="canvas-container">
    <div id="release-msg" class="status-msg"></div>
    <video class="input_video" playsinline muted></video>
    <canvas class="output_canvas"></canvas>
  </div>

  <script>
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const releaseMsg = document.getElementById('release-msg');
    
    let camera = null;
    let currentFacingMode = "environment";
    let isVideoMode = false;
    let frameCount = 0;
    
    // 加速設定：每 4 幀才運算一次 AI
    const FRAME_SKIP = 4; 

    let lastElbowX = 0;
    let baseHeadPos = null;

    function calculateAngle(a, b, c) {
      if(!a || !b || !c) return 0;
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle;
    }

    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    // ⚡ 速度核心優化：將模型複雜度降為 0 (Lite 版)
    pose.setOptions({
      modelComplexity: 0, 
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
      canvasElement.width = videoElement.videoWidth || 640;
      canvasElement.height = videoElement.videoHeight || 480;
      const w = canvasElement.width;
      const h = canvasElement.height;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, w, h);
      canvasCtx.drawImage(results.image, 0, 0, w, h);

      if (results.poseLandmarks) {
        const lm = results.poseLandmarks;
        
        const isRightHanded = lm[14].y < lm[13].y; 
        const backElbow = isRightHanded ? lm[14] : lm[13];
        const backShoulder = isRightHanded ? lm[12] : lm[11];
        const backWrist = isRightHanded ? lm[16] : lm[15];

        const elbowAngle = calculateAngle(backShoulder, backElbow, backWrist);
        const alignmentError = Math.abs(backElbow.y - backShoulder.y) * 100;
        const alignScore = Math.max(0, Math.round(100 - alignmentError * 6));

        const sMid = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2 };
        const hMid = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2 };
        const torsoAngle = calculateAngle({x: sMid.x, y: 0}, sMid, hMid);

        if (!baseHeadPos) baseHeadPos = lm[0].y;
        const headStatus = Math.abs(lm[0].y - baseHeadPos) > 0.03 ? "⚠️ 晃動" : "✅ 穩定";

        if (lastElbowX !== 0 && Math.abs(backElbow.x - lastElbowX) > 0.04) {
          releaseMsg.innerText = "💥 RELEASE!";
          setTimeout(() => { releaseMsg.innerText = ""; }, 800);
        }
        lastElbowX = backElbow.x;

        document.getElementById('elbow-val').innerText = Math.round(elbowAngle) + "°";
        document.getElementById('align-val').innerText = alignScore + "%";
        document.getElementById('torso-val').innerText = Math.round(torsoAngle) + "°";
        document.getElementById('head-val').innerText = headStatus;

        drawConnectors(canvasCtx, lm, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 1});
        drawLandmarks(canvasCtx, lm, {color: '#00FF00', lineWidth: 1, radius: 1});
      }
      canvasCtx.restore();
    });

    // ⚡ 影片加速處理邏輯
    async function processFrame() {
      if (videoElement.paused || videoElement.ended) return;

      frameCount++;
      // 每 4 幀才分析一次，其他時間只顯示原始影像
      if (frameCount % FRAME_SKIP === 0) {
        await pose.send({ image: videoElement });
      } else {
        // 如果不進行 AI 運算，直接把影片畫上去維持流暢感
        canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
      }
      
      requestAnimationFrame(processFrame);
    }

    function startCamera() {
      isVideoMode = false;
      if (camera) camera.stop();
      camera = new Camera(videoElement, {
        onFrame: async () => { if(!isVideoMode) await pose.send({image: videoElement}); },
        facingMode: currentFacingMode, width: 480, height: 360 // 降低解析度加速
      });
      camera.start();
    }

    function switchCamera() {
      currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
      startCamera();
    }

    function loadVideo(event) {
      const file = event.target.files[0];
      if (!file) return;
      isVideoMode = true;
      videoElement.src = URL.createObjectURL(file);
      videoElement.onloadeddata = () => {
        videoElement.play();
        processFrame();
      };
    }

    startCamera();
  </script>
</body>
</html>
