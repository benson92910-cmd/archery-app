<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 預分析極速版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .controls { display: flex; gap: 10px; padding: 20px 10px; width: 100%; justify-content: center; }
    .btn { background: #333; color: white; padding: 10px 15px; border-radius: 8px; border: 1px solid #00FF00; cursor: pointer; font-size: 14px; }
    #upload-input { display: none; }
    
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; margin-bottom: 15px; }
    .data-card { background: #222; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #00FF00; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }
    .data-label { font-size: 13px; color: #aaa; margin-bottom: 5px; }
    .data-value { font-size: 24px; font-weight: bold; }

    .canvas-container { position: relative; width: 92%; max-width: 640px; border-radius: 20px; overflow: hidden; border: 2px solid #333; }
    canvas { width: 100%; display: block; background: #000; }
    video { display: none; }

    /* 預分析遮罩層 */
    #analysis-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); display: none; flex-direction: column;
      justify-content: center; align-items: center; z-index: 200;
    }
    .progress-track { width: 80%; height: 8px; background: #333; border-radius: 4px; margin-top: 15px; overflow: hidden; }
    #progress-fill { width: 0%; height: 100%; background: #00FF00; box-shadow: 0 0 10px #00FF00; transition: width 0.1s; }
    .status-text { font-weight: bold; color: #00FF00; letter-spacing: 1px; }
    
    .release-hint { position: absolute; top: 20px; width: 100%; text-align: center; color: #FF3B30; font-size: 32px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 4px #000; }
  </style>
</head>
<body>

  <div class="controls">
    <button class="btn" onclick="switchCamera()">🔄 切換鏡頭</button>
    <label class="btn" for="upload-input">📁 上傳分析影片</label>
    <input type="file" id="upload-input" accept="video/*" onchange="startAnalysisFlow(event)">
    <button class="btn" onclick="location.reload()"><span style="color:red">●</span> 即時模式</button>
  </div>
  
  <div class="dashboard">
    <div class="data-card"><div class="data-label">後手肘角度</div><div id="elbow-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">軀幹垂直度</div><div id="torso-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">左膝角度</div><div id="lknee-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">右膝角度</div><div id="rknee-val" class="data-value">--°</div></div>
  </div>

  <div class="canvas-container">
    <div id="analysis-overlay">
      <div class="status-text">🔍 AI 深度預分析中...</div>
      <div class="progress-track"><div id="progress-fill"></div></div>
      <div id="percent-text" style="margin-top:10px; color:#00FF00; font-family: monospace;">0%</div>
    </div>
    <div id="release-msg" class="release-hint"></div>
    <video class="input_video" playsinline muted crossorigin="anonymous"></video>
    <canvas class="output_canvas"></canvas>
  </div>

  <script>
    const video = document.querySelector('.input_video');
    const canvas = document.querySelector('.output_canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('analysis-overlay');
    const fill = document.getElementById('progress-fill');
    const percentTxt = document.getElementById('percent-text');
    const releaseMsg = document.getElementById('release-msg');

    let camera = null;
    let isAnalyzing = false;
    let lastResults = null;
    let lastElbowX = 0;
    const AI_INPUT_SIZE = 256; 

    // 初始化 Pose
    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true });

    pose.onResults((results) => {
      lastResults = results;
      if (isAnalyzing) {
        stepNextFrame(); 
      } else {
        if (results.poseLandmarks) updateUI(results.poseLandmarks);
      }
    });

    function calculateAngle(a, b, c) {
      if(!a || !b || !c) return 0;
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return Math.round(angle);
    }

    function updateUI(lm) {
      const isRight = lm[14].y < lm[13].y;
      const elbow = calculateAngle(lm[isRight?12:11], lm[isRight?14:13], lm[isRight?16:15]);
      const sMid = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2 };
      const hMid = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2 };
      const torso = calculateAngle({x: sMid.x, y: 0}, sMid, hMid);
      const lKnee = calculateAngle(lm[23], lm[25], lm[27]);
      const rKnee = calculateAngle(lm[24], lm[26], lm[28]);

      document.getElementById('elbow-val').innerText = elbow + "°";
      document.getElementById('torso-val').innerText = torso + "°";
      document.getElementById('lknee-val').innerText = lKnee + "°";
      document.getElementById('rknee-val').innerText = rKnee + "°";

      const backElbowX = lm[isRight?14:13].x;
      if (lastElbowX !== 0 && Math.abs(backElbowX - lastElbowX) > 0.05) {
        releaseMsg.innerText = "💥 RELEASE!";
        setTimeout(() => { releaseMsg.innerText = ""; }, 1000);
      }
      lastElbowX = backElbowX;
    }

    // --- 預分析邏輯 ---
    async function startAnalysisFlow(event) {
      const file = event.target.files[0];
      if (!file) return;
      if (camera) { await camera.stop(); camera = null; }

      isAnalyzing = true;
      overlay.style.display = 'flex';
      video.src = URL.createObjectURL(file);
      
      video.onloadeddata = () => {
        video.currentTime = 0;
      };

      video.onseeked = () => {
        if (isAnalyzing) pose.send({ image: video });
      };
    }

    function stepNextFrame() {
      const progress = (video.currentTime / video.duration) * 100;
      fill.style.width = progress + "%";
      percentTxt.innerText = Math.round(progress) + "%";

      if (video.currentTime < video.duration - 0.1) {
        video.currentTime += 0.1; // ⚡ 跳轉 0.1 秒進行下一幀分析
      } else {
        finishAnalysis();
      }
    }

    function finishAnalysis() {
      isAnalyzing = false;
      overlay.style.display = 'none';
      video.currentTime = 0;
      video.play();
      requestAnimationFrame(renderLoop);
    }

    // --- 繪圖循環 ---
    function renderLoop() {
      if (!video.paused && !isAnalyzing) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.save();
        ctx.drawImage(video, 0, 0);
        if (lastResults && lastResults.poseLandmarks) {
          drawConnectors(ctx, lastResults.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
          drawLandmarks(ctx, lastResults.poseLandmarks, {color: '#FFFFFF', radius: 1});
        }
        ctx.restore();
        pose.send({ image: video });
        requestAnimationFrame(renderLoop);
      }
    }

    async function startCamera() {
      camera = new Camera(video, {
        onFrame: async () => {
          if (!isAnalyzing) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            await pose.send({ image: video });
          }
        },
        facingMode: "environment", width: 640, height: 480
      });
      camera.start();
    }

    window.onload = startCamera;
    function switchCamera() { location.reload(); }
  </script>
</body>
</html>
