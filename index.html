<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 專業數據穩定版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .header-controls { padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
    .btn { background: #222; color: #00FF00; padding: 8px 12px; border-radius: 6px; border: 1px solid #00FF00; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
    .btn:active { background: #00FF00; color: #000; }
    .btn-lock { border-color: #ff4444; color: #ff4444; }
    .btn-lock.active { background: #ff4444; color: #fff; }
    
    .comparison-container { display: flex; gap: 10px; width: 98%; max-width: 1400px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
    .video-slot { flex: 1; min-width: 320px; max-width: 600px; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; position: relative; }
    
    .canvas-box { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; overflow: hidden; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    video { display: none; }

    .slot-dash { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-top: 8px; }
    .mini-card { background: #000; padding: 5px; border-radius: 5px; text-align: center; border: 1px solid #444; }
    .mini-label { font-size: 10px; color: #888; margin-bottom: 2px; }
    .mini-val { font-size: 14px; color: #00FF00; font-weight: bold; }
    .delta-val { font-size: 11px; margin-top: 2px; }
    .stable { color: #00FF00; }
    .unstable { color: #ff4444; }

    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 8px; }
    .bar-bg { width: 60%; height: 6px; background: #333; border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .bar-fill { width: 0%; height: 100%; background: #00FF00; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header-controls">
    <button class="btn" onclick="activateLiveMode()">📸 即時鏡頭</button>
    <button class="btn" onclick="toggleCamera()">🔄 切換鏡頭</button>
    <label class="btn" for="upload-A">📁 影片 A</label>
    <input type="file" id="upload-A" accept="video/*" hidden onchange="handleFile(event, 'A')">
    <label class="btn" for="upload-B">📁 影片 B</label>
    <input type="file" id="upload-B" accept="video/*" hidden onchange="handleFile(event, 'B')">
    <button class="btn btn-lock" id="lock-btn" onclick="toggleLock()">🔒 鎖定滿弓定位點</button>
    <button class="btn" style="border-color:#aaa; color:#aaa" onclick="location.reload()">🔄 重設</button>
  </div>

  <div id="sync-controls" class="hidden" style="margin-top:10px;">
    <button class="btn" id="sync-btn" style="background:#00FF00; color:#000; padding: 10px 40px;" onclick="togglePlaySync()">▶ 同步播放 / 暫停</button>
  </div>

  <div class="comparison-container">
    <div class="video-slot" id="slot-A">
      <div class="canvas-box">
        <div class="overlay" id="overlay-A"><div id="msg-A">分析中...</div><div class="bar-bg"><div class="bar-fill" id="fill-A"></div></div></div>
        <video id="video-A" playsinline muted></video>
        <canvas id="canvas-A"></canvas>
      </div>
      <input type="range" class="custom-progress hidden" id="progress-A" style="width:100%" min="0" max="100" value="0" oninput="manualSeek('A')">
      
      <div class="slot-dash">
        <div class="mini-card"><div class="mini-label">後手肘 (開弓)</div><div id="elbow-A" class="mini-val">--°</div><div id="d-elbow-A" class="delta-val">--</div></div>
        <div class="mini-card"><div class="mini-label">前肩 (推弓)</div><div id="fshoulder-A" class="mini-val">--°</div><div id="d-fshoulder-A" class="delta-val">--</div></div>
        <div class="mini-card"><div class="mini-label">軀幹垂直</div><div id="torso-A" class="mini-val">--°</div><div id="d-torso-A" class="delta-val">--</div></div>
      </div>
    </div>

    <div class="video-slot hidden" id="slot-B">
      <div class="canvas-box">
        <div class="overlay" id="overlay-B"><div id="msg-B">分析中...</div><div class="bar-bg"><div class="bar-fill" id="fill-B"></div></div></div>
        <video id="video-B" playsinline muted></video>
        <canvas id="canvas-B"></canvas>
      </div>
      <input type="range" class="custom-progress" id="progress-B" style="width:100%" min="0" max="100" value="0" oninput="manualSeek('B')">
      
      <div class="slot-dash">
        <div class="mini-card"><div class="mini-label">後手肘</div><div id="elbow-B" class="mini-val">--°</div><div id="d-elbow-B" class="delta-val">--</div></div>
        <div class="mini-card"><div class="mini-label">前肩</div><div id="fshoulder-B" class="mini-val">--°</div><div id="d-fshoulder-B" class="delta-val">--</div></div>
        <div class="mini-card"><div class="mini-label">軀幹垂直</div><div id="torso-B" class="mini-val">--°</div><div id="d-torso-B" class="delta-val">--</div></div>
      </div>
    </div>
  </div>

  <script>
    const slots = {
      A: { vid: document.getElementById('video-A'), cvs: document.getElementById('canvas-A'), ctx: document.getElementById('canvas-A').getContext('2d'), ovl: document.getElementById('overlay-A'), fill: document.getElementById('fill-A'), prog: document.getElementById('progress-A'), lastRes: null, baseline: null, lastElbowX: null },
      B: { vid: document.getElementById('video-B'), cvs: document.getElementById('canvas-B'), ctx: document.getElementById('canvas-B').getContext('2d'), ovl: document.getElementById('overlay-B'), fill: document.getElementById('fill-B'), prog: document.getElementById('progress-B'), lastRes: null, baseline: null, lastElbowX: null }
    };

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });

    let camera = null, currentFacingMode = "environment", isLiveMode = false, globalAiBusy = false, currentCallbackTarget = null, isLocked = false;

    pose.onResults((results) => {
      if (currentCallbackTarget && slots[currentCallbackTarget]) {
        slots[currentCallbackTarget].lastRes = results;
        processArcheryLogic(currentCallbackTarget, results.poseLandmarks);
      }
      globalAiBusy = false;
    });

    // 核心計算邏輯
    function processArcheryLogic(id, lm) {
      if (!lm) return;
      const slot = slots[id];
      
      const getAng = (p1, p2, p3) => {
        const rad = Math.atan2(p3.y-p2.y, p3.x-p2.x) - Math.atan2(p1.y-p2.y, p1.x-p2.x);
        let ang = Math.abs(rad * 180 / Math.PI);
        return Math.round(ang > 180 ? 360 - ang : ang);
      };

      // 判斷持弓手 (前手) 與 拉弦手 (後手)
      // 假設拉弦手(後手)是靠近臉部的那個
      const isRightHanded = lm[16].x > lm[15].x; // 簡單邏輯：x較大者為後手
      const backElbowIdx = isRightHanded ? 14 : 13;
      const backShoulderIdx = isRightHanded ? 12 : 11;
      const backWristIdx = isRightHanded ? 16 : 15;
      
      const frontShoulderIdx = isRightHanded ? 11 : 12;
      const frontHipIdx = isRightHanded ? 23 : 24;

      // 1. 後手肘夾角 (上臂與前臂)
      const elbowAng = getAng(lm[backShoulderIdx], lm[backElbowIdx], lm[backWristIdx]);
      // 2. 前肩夾角 (軀幹與上臂)
      const fShoulderAng = getAng(lm[frontHipIdx], lm[frontShoulderIdx], lm[isRightHanded?11:12]);
      // 3. 軀幹垂直度 (前肩到前髖 vs 垂直線)
      const torsoAng = getAng({x: lm[frontShoulderIdx].x, y: 0}, lm[frontShoulderIdx], lm[frontHipIdx]);

      const currentData = { elbow: elbowAng, fshoulder: fShoulderAng, torso: torsoAng };

      // 自動放箭偵測 (偵測後手肘 X 軸突發位移)
      if (!slot.vid.paused && slot.lastElbowX !== null) {
        const move = Math.abs(lm[backElbowIdx].x - slot.lastElbowX);
        if (move > 0.05) { // 位移閾值
            slot.vid.pause();
            console.log("偵測到放箭，自動鎖定數據");
        }
      }
      slot.lastElbowX = lm[backElbowIdx].x;

      // 更新 UI 與偏差計算
      updateDisplay(id, 'elbow', elbowAng);
      updateDisplay(id, 'fshoulder', fShoulderAng);
      updateDisplay(id, 'torso', torsoAng);

      if (isLocked && !slot.baseline) {
        slot.baseline = currentData;
      }
    }

    function updateDisplay(slotId, key, val) {
      const valEl = document.getElementById(`${key}-${slotId}`);
      const deltaEl = document.getElementById(`d-${key}-${slotId}`);
      valEl.innerText = val + "°";
      
      const slot = slots[slotId];
      if (isLocked && slot.baseline) {
        const diff = val - slot.baseline[key];
        const absDiff = Math.abs(diff);
        deltaEl.innerText = (diff >= 0 ? "+" : "") + diff + "°";
        deltaEl.className = `delta-val ${absDiff < 4 ? 'stable' : 'unstable'}`;
      } else {
        deltaEl.innerText = "--";
      }
    }

    function toggleLock() {
      isLocked = !isLocked;
      const btn = document.getElementById('lock-btn');
      if (isLocked) {
        btn.innerText = "🔓 解除鎖定";
        btn.classList.add('active');
        // 抓取當前幀作為基準
        slots.A.baseline = null; 
        slots.B.baseline = null;
      } else {
        btn.innerText = "🔒 鎖定滿弓定位點";
        btn.classList.remove('active');
      }
    }

    // --- 以下維持原有的基礎功能 ---
    async function activateLiveMode() {
      isLiveMode = true;
      document.getElementById('slot-B').classList.add('hidden');
      document.getElementById('sync-controls').classList.add('hidden');
      if (camera) await camera.stop();
      slots.A.vid.src = ""; slots.A.vid.srcObject = null;
      camera = new Camera(slots.A.vid, {
        onFrame: async () => {
          if (isLiveMode && !globalAiBusy) {
            globalAiBusy = true; currentCallbackTarget = 'A';
            await pose.send({ image: slots.A.vid });
          }
        }, facingMode: currentFacingMode, width: 640, height: 480
      });
      camera.start();
    }

    async function toggleCamera() {
        currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
        if (isLiveMode) activateLiveMode();
    }

    async function handleFile(event, id) {
      isLiveMode = false; if (camera) { await camera.stop(); camera = null; }
      const file = event.target.files[0]; if (!file) return;
      if (id === 'B') {
        document.getElementById('slot-B').classList.remove('hidden');
        document.getElementById('sync-controls').classList.remove('hidden');
      }
      const slot = slots[id];
      slot.prog.classList.remove('hidden');
      slot.ovl.style.display = 'flex';
      slot.vid.src = URL.createObjectURL(file);
      slot.vid.load();
      await new Promise(r => slot.vid.onloadeddata = r);
      const duration = slot.vid.duration, step = 0.2;
      for (let t = 0; t <= duration; t += step) {
        slot.vid.currentTime = t;
        await new Promise(res => { slot.vid.onseeked = res; });
        globalAiBusy = true; currentCallbackTarget = id;
        await pose.send({ image: slot.vid });
        slot.fill.style.width = (t / duration * 100) + "%";
      }
      slot.ovl.style.display = 'none';
      slot.vid.currentTime = 0;
    }

    async function manualSeek(id) {
      const slot = slots[id];
      slot.vid.currentTime = (slot.prog.value / 100) * slot.vid.duration;
      const onSeekedOnce = async () => {
        slot.vid.removeEventListener('seeked', onSeekedOnce);
        if (!globalAiBusy) {
          globalAiBusy = true; currentCallbackTarget = id;
          await pose.send({ image: slot.vid });
        }
      };
      slot.vid.addEventListener('seeked', onSeekedOnce);
    }

    function togglePlaySync() {
      const vA = slots.A.vid, vB = slots.B.vid;
      if (vA.paused) { vA.play(); if(vB.src) vB.play(); } else { vA.pause(); vB.pause(); }
    }

    let frameCount = 0;
    function draw() {
      frameCount++;
      ['A', 'B'].forEach(id => {
        const slot = slots[id];
        if (slot.vid.readyState >= 2) {
          slot.cvs.width = slot.vid.videoWidth;
          slot.cvs.height = slot.vid.videoHeight;
          slot.ctx.drawImage(slot.vid, 0, 0);
          if (!slot.vid.paused && slot.vid.duration) {
            slot.prog.value = (slot.vid.currentTime / slot.vid.duration) * 100;
            const myTurn = (id === 'A' && frameCount % 6 === 0) || (id === 'B' && frameCount % 6 === 3);
            if (!isLiveMode && myTurn && !globalAiBusy) {
                globalAiBusy = true; currentCallbackTarget = id;
                pose.send({ image: slot.vid });
            }
          }
          if (slot.lastRes && slot.lastRes.poseLandmarks) {
            drawConnectors(slot.ctx, slot.lastRes.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            drawLandmarks(slot.ctx, slot.lastRes.poseLandmarks, {color: '#FFF', radius: 1});
          }
        }
      });
      requestAnimationFrame(draw);
    }
    window.onload = () => { draw(); activateLiveMode(); };
  </script>
</body>
</html>
