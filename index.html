<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 穩定比對版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .header-controls { padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
    .btn { background: #222; color: #00FF00; padding: 8px 12px; border-radius: 6px; border: 1px solid #00FF00; cursor: pointer; font-size: 12px; font-weight: bold; }
    .btn-danger { border-color: #ff4444; color: #ff4444; }
    
    .comparison-container { display: flex; gap: 10px; width: 95%; max-width: 1200px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
    .video-slot { flex: 1; min-width: 300px; max-width: 500px; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; position: relative; }
    
    .canvas-box { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; overflow: hidden; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    video { display: none; }

    .custom-progress { width: 100%; margin: 10px 0; cursor: pointer; accent-color: #00FF00; }
    
    .slot-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
    .mini-card { background: #000; padding: 5px; border-radius: 5px; text-align: center; border: 1px solid #444; }
    .mini-label { font-size: 10px; color: #888; }
    .mini-val { font-size: 16px; color: #00FF00; font-weight: bold; }

    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 8px; }
    .bar-bg { width: 60%; height: 6px; background: #333; border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .bar-fill { width: 0%; height: 100%; background: #00FF00; }

    #sync-controls { width: 100%; display: flex; justify-content: center; padding: 10px; gap: 10px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header-controls">
    <button class="btn" onclick="activateLiveMode()">📸 開啟即時鏡頭</button>
    <button class="btn" onclick="toggleCamera()">🔄 切換前後鏡頭</button>
    <label class="btn" for="upload-A">📁 上傳影片 A</label>
    <input type="file" id="upload-A" accept="video/*" hidden onchange="handleFile(event, 'A')">
    <label class="btn" for="upload-B">📁 上傳影片 B</label>
    <input type="file" id="upload-B" accept="video/*" hidden onchange="handleFile(event, 'B')">
    <button class="btn btn-danger" onclick="location.reload()">🔄 重設</button>
  </div>

  <div id="sync-controls" class="hidden">
    <button class="btn" id="sync-btn" style="background:#00FF00; color:#000; padding: 10px 30px;" onclick="togglePlaySync()">▶ 同步播放 / 暫停</button>
  </div>

  <div class="comparison-container">
    <div class="video-slot" id="slot-A">
      <div class="canvas-box">
        <div class="overlay" id="overlay-A"><div style="color:#00FF00">分析 A 中...</div><div class="bar-bg"><div class="bar-fill" id="fill-A"></div></div></div>
        <video id="video-A" playsinline muted></video>
        <canvas id="canvas-A"></canvas>
      </div>
      <input type="range" class="custom-progress hidden" id="progress-A" min="0" max="100" value="0" oninput="manualSeek('A')">
      <div class="slot-dash">
        <div class="mini-card"><div class="mini-label">後手肘</div><div id="elbow-A" class="mini-val">--°</div></div>
        <div class="mini-card"><div class="mini-label">軀幹</div><div id="torso-A" class="mini-val">--°</div></div>
      </div>
    </div>

    <div class="video-slot hidden" id="slot-B">
      <div class="canvas-box">
        <div class="overlay" id="overlay-B"><div style="color:#00FF00">分析 B 中...</div><div class="bar-bg"><div class="bar-fill" id="fill-B"></div></div></div>
        <video id="video-B" playsinline muted></video>
        <canvas id="canvas-B"></canvas>
      </div>
      <input type="range" class="custom-progress" id="progress-B" min="0" max="100" value="0" oninput="manualSeek('B')">
      <div class="slot-dash">
        <div class="mini-card"><div class="mini-label">後手肘</div><div id="elbow-B" class="mini-val">--°</div></div>
        <div class="mini-card"><div class="mini-label">軀幹</div><div id="torso-B" class="mini-val">--°</div></div>
      </div>
    </div>
  </div>

  <script>
    const slots = {
      A: { vid: document.getElementById('video-A'), cvs: document.getElementById('canvas-A'), ctx: document.getElementById('canvas-A').getContext('2d'), ovl: document.getElementById('overlay-A'), fill: document.getElementById('fill-A'), prog: document.getElementById('progress-A'), lastRes: null, isProcessing: false },
      B: { vid: document.getElementById('video-B'), cvs: document.getElementById('canvas-B'), ctx: document.getElementById('canvas-B').getContext('2d'), ovl: document.getElementById('overlay-B'), fill: document.getElementById('fill-B'), prog: document.getElementById('progress-B'), lastRes: null, isProcessing: false }
    };

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });

    let camera = null;
    let currentFacingMode = "environment";
    let isLiveMode = false;
    let currentCallbackTarget = null; // 用來標記當前 onResults 該更新誰

    pose.onResults((results) => {
      if (currentCallbackTarget && slots[currentCallbackTarget]) {
        slots[currentCallbackTarget].lastRes = results;
        updateUI(currentCallbackTarget, results.poseLandmarks);
        slots[currentCallbackTarget].isProcessing = false;
      }
    });

    async function activateLiveMode() {
      isLiveMode = true;
      document.getElementById('slot-B').classList.add('hidden');
      document.getElementById('sync-controls').classList.add('hidden');
      if (camera) await camera.stop();
      
      slots.A.vid.src = "";
      slots.A.vid.srcObject = null;

      camera = new Camera(slots.A.vid, {
        onFrame: async () => {
          if (isLiveMode && !slots.A.isProcessing) {
            slots.A.isProcessing = true;
            currentCallbackTarget = 'A';
            await pose.send({ image: slots.A.vid });
          }
        },
        facingMode: currentFacingMode, width: 640, height: 480
      });
      camera.start();
    }

    async function toggleCamera() {
      currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
      if (isLiveMode) activateLiveMode();
    }

    async function handleFile(event, id) {
      isLiveMode = false;
      if (camera) { await camera.stop(); camera = null; }
      
      const file = event.target.files[0];
      if (!file) return;

      if (id === 'B') {
        document.getElementById('slot-B').classList.remove('hidden');
        document.getElementById('sync-controls').classList.remove('hidden');
      }
      document.getElementById(`progress-${id}`).classList.remove('hidden');

      const slot = slots[id];
      slot.ovl.style.display = 'flex';
      slot.vid.srcObject = null;
      slot.vid.src = URL.createObjectURL(file);
      slot.vid.load();

      await new Promise(r => slot.vid.onloadeddata = r);
      const duration = slot.vid.duration;
      const step = 0.15; // 稍微降低分析頻率以確保穩定性

      for (let t = 0; t <= duration; t += step) {
        slot.vid.currentTime = t;
        await new Promise(res => { slot.vid.onseeked = res; });
        slot.isProcessing = true;
        currentCallbackTarget = id;
        await pose.send({ image: slot.vid });
        slot.fill.style.width = (t / duration * 100) + "%";
      }

      slot.ovl.style.display = 'none';
      slot.vid.currentTime = 0;
      slot.isProcessing = false;
    }

    function updateUI(id, lm) {
      if (!lm) return;
      const getAng = (p1, p2, p3) => {
        const rad = Math.atan2(p3.y-p2.y, p3.x-p2.x) - Math.atan2(p1.y-p2.y, p1.x-p2.x);
        let ang = Math.abs(rad * 180 / Math.PI);
        return Math.round(ang > 180 ? 360 - ang : ang);
      };
      const isR = lm[14].y < lm[13].y;
      const valEl = document.getElementById(`elbow-${id}`);
      if(valEl) valEl.innerText = getAng(lm[isR?12:11], lm[isR?14:13], lm[isR?16:15]) + "°";
    }

    function togglePlaySync() {
      const vA = slots.A.vid, vB = slots.B.vid;
      if (vA.paused) { vA.play(); if(vB.src) vB.play(); } else { vA.pause(); vB.pause(); }
    }

    function manualSeek(id) {
      const slot = slots[id];
      slot.vid.currentTime = (slot.prog.value / 100) * slot.vid.duration;
    }

    let frameCount = 0;
    function draw() {
      frameCount++;
      ['A', 'B'].forEach(id => {
        const slot = slots[id];
        if (slot.vid.readyState >= 2) {
          slot.cvs.width = slot.vid.videoWidth;
          slot.cvs.height = slot.vid.videoHeight;
          slot.ctx.drawImage(slot.vid, 0, 0);
          
          if (!slot.vid.paused && slot.vid.duration) {
            slot.prog.value = (slot.vid.currentTime / slot.vid.duration) * 100;
            // 播放時每 3 幀請求一次 AI，避免兩部影片搶奪資源
            if (!isLiveMode && !slot.isProcessing && frameCount % 3 === 0) {
                slot.isProcessing = true;
                currentCallbackTarget = id;
                pose.send({ image: slot.vid });
            }
          }

          if (slot.lastRes && slot.lastRes.poseLandmarks) {
            drawConnectors(slot.ctx, slot.lastRes.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            drawLandmarks(slot.ctx, slot.lastRes.poseLandmarks, {color: '#FFF', radius: 1});
          }
        }
      });
      requestAnimationFrame(draw);
    }

    window.onload = () => { draw(); activateLiveMode(); };
  </script>
</body>
</html>
