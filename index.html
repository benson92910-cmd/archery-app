<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 專業穩定度分析版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .header-controls { padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
    .btn { background: #222; color: #00FF00; padding: 8px 12px; border-radius: 6px; border: 1px solid #00FF00; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
    .btn:active { background: #00FF00; color: #000; }
    .btn-lock { border-color: #ff4444; color: #ff4444; }
    .btn-lock.active { background: #ff4444; color: #000; }
    
    .comparison-container { display: flex; gap: 10px; width: 95%; max-width: 1200px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
    .video-slot { flex: 1; min-width: 320px; max-width: 500px; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; position: relative; }
    
    .canvas-box { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; overflow: hidden; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    video { display: none; }

    .slot-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .mini-card { background: #000; padding: 8px; border-radius: 6px; border: 1px solid #444; }
    .mini-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .val-group { display: flex; justify-content: space-between; align-items: baseline; }
    .mini-val { font-size: 18px; color: #00FF00; font-weight: bold; }
    .mini-delta { font-size: 12px; font-weight: bold; }
    .delta-plus { color: #ff4444; } /* 偏差過大 */
    .delta-ok { color: #00FF00; }   /* 穩定 */

    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 8px; }
    .bar-bg { width: 60%; height: 6px; background: #333; border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .bar-fill { width: 0%; height: 100%; background: #00FF00; }

    .hidden { display: none !important; }
    .status-msg { font-size: 12px; color: #ffeb3b; text-align: center; margin-top: 5px; height: 15px; }
  </style>
</head>
<body>

  <div class="header-controls">
    <button class="btn" onclick="activateLiveMode()">📸 即時鏡頭</button>
    <label class="btn" for="upload-A">📁 上傳影片 A</label>
    <input type="file" id="upload-A" accept="video/*" hidden onchange="handleFile(event, 'A')">
    <label class="btn" for="upload-B">📁 上傳影片 B</label>
    <input type="file" id="upload-B" accept="video/*" hidden onchange="handleFile(event, 'B')">
    <button class="btn btn-lock" id="lock-btn" onclick="toggleLock()">🔒 鎖定定位點 (Anchor)</button>
    <button class="btn" style="border-color:#ff4444; color:#ff4444;" onclick="location.reload()">🔄 重設</button>
  </div>

  <div class="comparison-container">
    <div class="video-slot" id="slot-A">
      <div class="canvas-box">
        <div class="overlay" id="overlay-A"><div style="color:#00FF00">深度分析中...</div><div class="bar-bg"><div class="bar-fill" id="fill-A"></div></div></div>
        <video id="video-A" playsinline muted></video>
        <canvas id="canvas-A"></canvas>
      </div>
      <div class="status-msg" id="msg-A"></div>
      <div class="slot-dash">
        <div class="mini-card">
          <div class="mini-label">後手肘夾角</div>
          <div class="val-group">
            <span id="elbow-A" class="mini-val">--°</span>
            <span id="d-elbow-A" class="mini-delta">Δ --</span>
          </div>
        </div>
        <div class="mini-card">
          <div class="mini-label">開弓肩膀角</div>
          <div class="val-group">
            <span id="shoulder-A" class="mini-val">--°</span>
            <span id="d-shoulder-A" class="mini-delta">Δ --</span>
          </div>
        </div>
        <div class="mini-card">
          <div class="mini-label">軀幹垂直度</div>
          <div class="val-group">
            <span id="torso-A" class="mini-val">--°</span>
            <span id="d-torso-A" class="mini-delta">Δ --</span>
          </div>
        </div>
        <div class="mini-card">
          <div class="mini-label">重心傾斜</div>
          <div class="val-group">
            <span id="hip-A" class="mini-val">--°</span>
            <span id="d-hip-A" class="mini-delta">Δ --</span>
          </div>
        </div>
      </div>
    </div>

    <div class="video-slot hidden" id="slot-B">
        <div class="canvas-box">
            <div class="overlay" id="overlay-B"><div style="color:#00FF00">分析中...</div><div class="bar-bg"><div class="bar-fill" id="fill-B"></div></div></div>
            <video id="video-B" playsinline muted></video>
            <canvas id="canvas-B"></canvas>
        </div>
        <div class="status-msg" id="msg-B"></div>
        <div class="slot-dash">
            <div class="mini-card"><div class="mini-label">後手肘</div><div class="val-group"><span id="elbow-B" class="mini-val">--°</span><span id="d-elbow-B" class="mini-delta">Δ --</span></div></div>
            <div class="mini-card"><div class="mini-label">肩膀角</div><div class="val-group"><span id="shoulder-B" class="mini-val">--°</span><span id="d-shoulder-B" class="mini-delta">Δ --</span></div></div>
            <div class="mini-card"><div class="mini-label">垂直度</div><div class="val-group"><span id="torso-B" class="mini-val">--°</span><span id="d-torso-B" class="mini-delta">Δ --</span></div></div>
            <div class="mini-card"><div class="mini-label">重心</div><div class="val-group"><span id="hip-B" class="mini-val">--°</span><span id="d-hip-B" class="mini-delta">Δ --</span></div></div>
        </div>
    </div>
  </div>

  <script>
    const slots = {
      A: { vid: document.getElementById('video-A'), cvs: document.getElementById('canvas-A'), ctx: document.getElementById('canvas-A').getContext('2d'), ovl: document.getElementById('overlay-A'), fill: document.getElementById('fill-A'), lastRes: null, lastElbowX: null, baseline: null },
      B: { vid: document.getElementById('video-B'), cvs: document.getElementById('canvas-B'), ctx: document.getElementById('canvas-B').getContext('2d'), ovl: document.getElementById('overlay-B'), fill: document.getElementById('fill-B'), lastRes: null, lastElbowX: null, baseline: null }
    };

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });

    let camera = null;
    let isLiveMode = false;
    let globalAiBusy = false;
    let currentCallbackTarget = null;
    let isLocked = false;

    pose.onResults((results) => {
      if (currentCallbackTarget && slots[currentCallbackTarget]) {
        slots[currentCallbackTarget].lastRes = results;
        processArcheryLogic(currentCallbackTarget, results.poseLandmarks);
      }
      globalAiBusy = false;
    });

    function toggleLock() {
        isLocked = !isLocked;
        const btn = document.getElementById('lock-btn');
        if (isLocked) {
            btn.innerText = "🔓 解除鎖定";
            btn.classList.add('active');
            // 抓取當前數值作為基準
            ['A', 'B'].forEach(id => {
                if (slots[id].currentData) slots[id].baseline = { ...slots[id].currentData };
            });
        } else {
            btn.innerText = "🔒 鎖定定位點 (Anchor)";
            btn.classList.remove('active');
            ['A', 'B'].forEach(id => { slots[id].baseline = null; });
        }
    }

    function getAng(p1, p2, p3) {
        const rad = Math.atan2(p3.y-p2.y, p3.x-p2.x) - Math.atan2(p1.y-p2.y, p1.x-p2.x);
        let ang = Math.abs(rad * 180 / Math.PI);
        return Math.round(ang > 180 ? 360 - ang : ang);
    }

    function processArcheryLogic(id, lm) {
      if (!lm) return;
      const slot = slots[id];
      
      // 1. 辨別左右撇子 (以手肘較高者為後手肘)
      const isRightHanded = lm[14].y < lm[13].y;
      const drawElbow = isRightHanded ? lm[14] : lm[13];
      const drawShoulder = isRightHanded ? lm[12] : lm[11];
      const drawWrist = isRightHanded ? lm[16] : lm[15];
      const frontShoulder = isRightHanded ? lm[11] : lm[12];
      const frontHip = isRightHanded ? lm[23] : lm[24];

      // 2. 計算各項角度
      const data = {
          elbow: getAng(drawShoulder, drawElbow, drawWrist), // 後手肘夾角
          shoulder: getAng(frontShoulder, drawShoulder, drawElbow), // 肩膀開弓角
          torso: getAng({x: frontShoulder.x, y: 0}, frontShoulder, frontHip), // 軀幹垂直度
          hip: getAng({x: (lm[23].x+lm[24].x)/2, y: 0}, {x: (lm[23].x+lm[24].x)/2, y: (lm[23].y+lm[24].y)/2}, lm[23]) // 髖部重心
      };
      slot.currentData = data;

      // 3. 自動放箭偵測 (偵測後手肘水平突變)
      if (slot.lastElbowX !== null) {
          const move = Math.abs(drawElbow.x - slot.lastElbowX);
          if (move > 0.05 && !slot.vid.paused) { // 靈敏度閾值
              slot.vid.pause();
              document.getElementById(`msg-${id}`).innerText = "🎯 偵測到放箭！已自動定格";
          }
      }
      slot.lastElbowX = drawElbow.x;

      // 4. 更新 UI
      updateDisplay(id, data);
    }

    function updateDisplay(id, data) {
        const slot = slots[id];
        const fields = ['elbow', 'shoulder', 'torso', 'hip'];
        
        fields.forEach(f => {
            const valEl = document.getElementById(`${f}-${id}`);
            const deltaEl = document.getElementById(`d-${f}-${id}`);
            valEl.innerText = data[f] + "°";

            if (slot.baseline) {
                const diff = data[f] - slot.baseline[f];
                deltaEl.innerText = `Δ ${diff > 0 ? '+' : ''}${diff}`;
                deltaEl.className = Math.abs(diff) > 3 ? 'mini-delta delta-plus' : 'mini-delta delta-ok';
            } else {
                deltaEl.innerText = "Δ --";
                deltaEl.className = 'mini-delta';
            }
        });
    }

    // --- 以下為基礎影片控制邏輯 ---

    async function activateLiveMode() {
      isLiveMode = true;
      document.getElementById('slot-B').classList.add('hidden');
      if (camera) await camera.stop();
      slots.A.vid.srcObject = null;
      camera = new Camera(slots.A.vid, {
        onFrame: async () => {
          if (isLiveMode && !globalAiBusy) {
            globalAiBusy = true;
            currentCallbackTarget = 'A';
            await pose.send({ image: slots.A.vid });
          }
        },
        facingMode: "environment", width: 640, height: 480
      });
      camera.start();
    }

    async function handleFile(event, id) {
      isLiveMode = false;
      const file = event.target.files[0];
      if (!file) return;
      if (id === 'B') document.getElementById('slot-B').classList.remove('hidden');

      const slot = slots[id];
      slot.ovl.style.display = 'flex';
      slot.vid.src = URL.createObjectURL(file);
      slot.vid.load();

      await new Promise(r => slot.vid.onloadeddata = r);
      const duration = slot.vid.duration;
      for (let t = 0; t <= duration; t += 0.2) {
        slot.vid.currentTime = t;
        await new Promise(res => { slot.vid.onseeked = res; });
        currentCallbackTarget = id;
        await pose.send({ image: slot.vid });
        slot.fill.style.width = (t / duration * 100) + "%";
      }
      slot.ovl.style.display = 'none';
      slot.vid.currentTime = 0;
    }

    function draw() {
      ['A', 'B'].forEach(id => {
        const slot = slots[id];
        if (slot.vid.readyState >= 2) {
          slot.cvs.width = slot.vid.videoWidth;
          slot.cvs.height = slot.vid.videoHeight;
          slot.ctx.drawImage(slot.vid, 0, 0);
          
          if (!isLiveMode && !slot.vid.paused && !globalAiBusy) {
              globalAiBusy = true;
              currentCallbackTarget = id;
              pose.send({ image: slot.vid });
          }

          if (slot.lastRes && slot.lastRes.poseLandmarks) {
            drawConnectors(slot.ctx, slot.lastRes.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            drawLandmarks(slot.ctx, slot.lastRes.poseLandmarks, {color: '#FFF', radius: 1});
          }
        }
      });
      requestAnimationFrame(draw);
    }

    window.onload = () => { draw(); activateLiveMode(); };
  </script>
</body>
</html>
