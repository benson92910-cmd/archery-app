<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 穩定度分析旗艦版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .header-controls { padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
    .btn { background: #222; color: #00FF00; padding: 8px 12px; border-radius: 6px; border: 1px solid #00FF00; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
    .btn:active { background: #00FF00; color: #000; }
    .btn-lock { border-color: #ff4444; color: #ff4444; }
    .btn-lock.active { background: #ff4444; color: white; }
    
    .comparison-container { display: flex; gap: 10px; width: 95%; max-width: 1200px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
    .video-slot { flex: 1; min-width: 320px; max-width: 500px; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; position: relative; }
    
    .canvas-box { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; overflow: hidden; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    video { display: none; }

    .custom-progress { width: 100%; margin: 10px 0; cursor: pointer; accent-color: #00FF00; }
    
    /* 儀表板 UI 升級 */
    .slot-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .mini-card { background: #000; padding: 8px; border-radius: 6px; text-align: left; border: 1px solid #444; }
    .mini-label { font-size: 10px; color: #888; margin-bottom: 4px; }
    .val-row { display: flex; justify-content: space-between; align-items: baseline; }
    .mini-val { font-size: 16px; color: #00FF00; font-weight: bold; }
    .mini-delta { font-size: 12px; font-weight: bold; margin-left: 5px; }
    .delta-bad { color: #ff4444; }
    .delta-good { color: #00FF00; }

    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; border-radius: 8px; }
    .bar-bg { width: 60%; height: 6px; background: #333; border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .bar-fill { width: 0%; height: 100%; background: #00FF00; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header-controls">
    <button class="btn" onclick="activateLiveMode()">📸 即時鏡頭</button>
    <button class="btn" id="lock-btn" onclick="toggleLock()" style="border-color: #ff4444; color: #ff4444;">🔒 鎖定定位點 (Anchor)</button>
    <label class="btn" for="upload-A">📁 上傳影片 A</label>
    <input type="file" id="upload-A" accept="video/*" hidden onchange="handleFile(event, 'A')">
    <label class="btn" for="upload-B">📁 上傳影片 B</label>
    <input type="file" id="upload-B" accept="video/*" hidden onchange="handleFile(event, 'B')">
    <button class="btn" style="border-color: #ff4444; color: #ff4444;" onclick="location.reload()">🔄 重設</button>
  </div>

  <div class="comparison-container">
    <div class="video-slot" id="slot-A">
      <div class="canvas-box">
        <div class="overlay" id="overlay-A"><div style="color:#00FF00">深度分析中...</div><div class="bar-bg"><div class="bar-fill" id="fill-A"></div></div></div>
        <video id="video-A" playsinline muted></video>
        <canvas id="canvas-A"></canvas>
      </div>
      <input type="range" class="custom-progress hidden" id="progress-A" min="0" max="100" value="0" oninput="manualSeek('A')">
      
      <div class="slot-dash">
        <div class="mini-card"><div class="mini-label">後手肘夾角</div><div class="val-row"><span id="elbow-A" class="mini-val">--°</span><span id="d-elbow-A" class="mini-delta"></span></div></div>
        <div class="mini-card"><div class="mini-label">開弓肩膀角</div><div class="val-row"><span id="shoulder-A" class="mini-val">--°</span><span id="d-shoulder-A" class="mini-delta"></span></div></div>
        <div class="mini-card"><div class="mini-label">前臂夾角</div><div class="val-row"><span id="arm-A" class="mini-val">--°</span><span id="d-arm-A" class="mini-delta"></span></div></div>
        <div class="mini-card"><div class="mini-label">軀幹垂直度</div><div class="val-row"><span id="torso-A" class="mini-val">--°</span><span id="d-torso-A" class="mini-delta"></span></div></div>
        <div class="mini-card"><div class="mini-label">重心傾斜(髖)</div><div class="val-row"><span id="hip-A" class="mini-val">--°</span><span id="d-hip-A" class="mini-delta"></span></div></div>
      </div>
    </div>

    <div class="video-slot hidden" id="slot-B">
      <div class="canvas-box">
        <div class="overlay" id="overlay-B"><div style="color:#00FF00">深度分析中...</div><div class="bar-bg"><div class="bar-fill" id="fill-B"></div></div></div>
        <video id="video-B" playsinline muted></video>
        <canvas id="canvas-B"></canvas>
      </div>
      <input type="range" class="custom-progress" id="progress-B" min="0" max="100" value="0" oninput="manualSeek('B')">
      
      <div class="slot-dash">
        <div class="mini-card"><div class="mini-label">後手肘夾角</div><div class="val-row"><span id="elbow-B" class="mini-val">--°</span><span id="d-elbow-B" class="mini-delta"></span></div></div>
        <div class="mini-card"><div class="mini-label">開弓肩膀角</div><div class="val-row"><span id="shoulder-B" class="mini-val">--°</span><span id="d-shoulder-B" class="mini-delta"></span></div></div>
        <div class="mini-card"><div class="mini-label">前臂夾角</div><div class="val-row"><span id="arm-B" class="mini-val">--°</span><span id="d-arm-B" class="mini-delta"></span></div></div>
        <div class="mini-card"><div class="mini-label">軀幹垂直度</div><div class="val-row"><span id="torso-B" class="mini-val">--°</span><span id="d-torso-B" class="mini-delta"></span></div></div>
        <div class="mini-card"><div class="mini-label">重心傾斜(髖)</div><div class="val-row"><span id="hip-B" class="mini-val">--°</span><span id="d-hip-B" class="mini-delta"></span></div></div>
      </div>
    </div>
  </div>

  <script>
    const slots = {
      A: { vid: document.getElementById('video-A'), cvs: document.getElementById('canvas-A'), ctx: document.getElementById('canvas-A').getContext('2d'), ovl: document.getElementById('overlay-A'), fill: document.getElementById('fill-A'), prog: document.getElementById('progress-A'), lastRes: null, baseline: null },
      B: { vid: document.getElementById('video-B'), cvs: document.getElementById('canvas-B'), ctx: document.getElementById('canvas-B').getContext('2d'), ovl: document.getElementById('overlay-B'), fill: document.getElementById('fill-B'), prog: document.getElementById('progress-B'), lastRes: null, baseline: null }
    };

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });

    let isLiveMode = false;
    let globalAiBusy = false;
    let currentCallbackTarget = null;
    let isLocked = false;

    pose.onResults((results) => {
      if (currentCallbackTarget && slots[currentCallbackTarget]) {
        slots[currentCallbackTarget].lastRes = results;
        processArcheryData(currentCallbackTarget, results.poseLandmarks);
      }
      globalAiBusy = false;
    });

    // 鎖定基準點功能
    function toggleLock() {
        isLocked = !isLocked;
        const btn = document.getElementById('lock-btn');
        if (isLocked) {
            btn.innerText = "🔓 解除鎖定";
            btn.classList.add('active');
            // 抓取當前各槽位的最後數據作為 Baseline
            ['A', 'B'].forEach(id => {
                if(slots[id].currentAngles) slots[id].baseline = {...slots[id].currentAngles};
            });
        } else {
            btn.innerText = "🔒 鎖定定位點 (Anchor)";
            btn.classList.remove('active');
            ['A', 'B'].forEach(id => { slots[id].baseline = null; });
        }
    }

    function getAng(p1, p2, p3) {
      const rad = Math.atan2(p3.y-p2.y, p3.x-p2.x) - Math.atan2(p1.y-p2.y, p1.x-p2.x);
      let ang = Math.abs(rad * 180 / Math.PI);
      return Math.round(ang > 180 ? 360 - ang : ang);
    }

    function processArcheryData(id, lm) {
      if (!lm) return;
      
      // 自動判定左右手 (以手肘 y 座標較高者為後手)
      const isRightHanded = lm[14].y < lm[13].y;
      const backShoulder = isRightHanded ? lm[12] : lm[11];
      const backElbow = isRightHanded ? lm[14] : lm[13];
      const backWrist = isRightHanded ? lm[16] : lm[15];
      const frontShoulder = isRightHanded ? lm[11] : lm[12];
      const frontElbow = isRightHanded ? lm[13] : lm[14];
      const frontWrist = isRightHanded ? lm[15] : lm[16];

      const angles = {
        elbow: getAng(backShoulder, backElbow, backWrist),
        shoulder: getAng(frontShoulder, backShoulder, backElbow),
        arm: getAng(frontShoulder, frontElbow, frontWrist),
        torso: getAng({x: frontShoulder.x, y: 0}, frontShoulder, {x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2}),
        hip: getAng({x: (lm[23].x + lm[24].x)/2, y: 0}, {x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2}, lm[23])
      };

      slots[id].currentAngles = angles;
      updateUIWithDelta(id, angles);
    }

    function updateUIWithDelta(id, angles) {
      const slot = slots[id];
      const items = ['elbow', 'shoulder', 'arm', 'torso', 'hip'];

      items.forEach(key => {
        const valEl = document.getElementById(`${key}-${id}`);
        const deltaEl = document.getElementById(`d-${key}-${id}`);
        
        valEl.innerText = angles[key] + "°";

        if (slot.baseline) {
          const diff = angles[key] - slot.baseline[key];
          deltaEl.innerText = `Δ${diff > 0 ? '+' : ''}${diff}`;
          // 穩定度判定：偏差 > 3度變紅，否則綠色
          deltaEl.className = Math.abs(diff) > 3 ? 'mini-delta delta-bad' : 'mini-delta delta-good';
        } else {
          deltaEl.innerText = "";
        }
      });
    }

    // --- 保持原有核心邏輯 (Camera, File, Draw) ---
    async function activateLiveMode() {
      isLiveMode = true;
      document.getElementById('slot-B').classList.add('hidden');
      if (camera) await camera.stop();
      slots.A.vid.srcObject = null;
      camera = new Camera(slots.A.vid, {
        onFrame: async () => {
          if (isLiveMode && !globalAiBusy) {
            globalAiBusy = true;
            currentCallbackTarget = 'A';
            await pose.send({ image: slots.A.vid });
          }
        },
        facingMode: "environment", width: 640, height: 480
      });
      camera.start();
    }

    async function handleFile(event, id) {
      isLiveMode = false;
      const file = event.target.files[0];
      if (!file) return;
      if (id === 'B') document.getElementById('slot-B').classList.remove('hidden');
      
      const slot = slots[id];
      slot.ovl.style.display = 'flex';
      slot.vid.src = URL.createObjectURL(file);
      slot.vid.load();
      await new Promise(r => slot.vid.onloadeddata = r);
      
      const duration = slot.vid.duration;
      for (let t = 0; t <= duration; t += 0.2) {
        slot.vid.currentTime = t;
        await new Promise(res => { slot.vid.onseeked = res; });
        globalAiBusy = true;
        currentCallbackTarget = id;
        await pose.send({ image: slot.vid });
        slot.fill.style.width = (t / duration * 100) + "%";
      }
      slot.ovl.style.display = 'none';
      slot.vid.currentTime = 0;
    }

    function manualSeek(id) {
      const slot = slots[id];
      slot.vid.currentTime = (slot.prog.value / 100) * slot.vid.duration;
      const onSeeked = async () => {
        slot.vid.removeEventListener('seeked', onSeeked);
        if (!globalAiBusy) {
          globalAiBusy = true;
          currentCallbackTarget = id;
          await pose.send({ image: slot.vid });
        }
      };
      slot.vid.addEventListener('seeked', onSeeked);
    }

    let frameCount = 0;
    function draw() {
      frameCount++;
      ['A', 'B'].forEach(id => {
        const slot = slots[id];
        if (slot.vid.readyState >= 2) {
          slot.cvs.width = slot.vid.videoWidth;
          slot.cvs.height = slot.vid.videoHeight;
          slot.ctx.drawImage(slot.vid, 0, 0);
          
          if (!slot.vid.paused && slot.vid.duration && !isLiveMode) {
            slot.prog.value = (slot.vid.currentTime / slot.vid.duration) * 100;
            const myTurn = (id === 'A' && frameCount % 6 === 0) || (id === 'B' && frameCount % 6 === 3);
            if (myTurn && !globalAiBusy) {
                globalAiBusy = true;
                currentCallbackTarget = id;
                pose.send({ image: slot.vid });
            }
          }

          if (slot.lastRes && slot.lastRes.poseLandmarks) {
            drawConnectors(slot.ctx, slot.lastRes.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            drawLandmarks(slot.ctx, slot.lastRes.poseLandmarks, {color: '#FFF', radius: 1});
          }
        }
      });
      requestAnimationFrame(draw);
    }

    let camera = null;
    window.onload = () => { draw(); activateLiveMode(); };
  </script>
</body>
</html>
