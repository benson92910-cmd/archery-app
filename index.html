<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 穩定比對版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .header-controls { padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
    .btn { background: #222; color: #00FF00; padding: 8px 12px; border-radius: 6px; border: 1px solid #00FF00; cursor: pointer; font-size: 12px; font-weight: bold; }
    .btn-danger { border-color: #ff4444; color: #ff4444; }
    .comparison-container { display: flex; gap: 10px; width: 95%; max-width: 1200px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
    .video-slot { flex: 1; min-width: 300px; max-width: 500px; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; position: relative; }
    .canvas-box { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; overflow: hidden; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    video { display: none; }
    .custom-progress { width: 100%; margin: 10px 0; accent-color: #00FF00; }
    .slot-dash { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
    .mini-card { background: #000; padding: 5px; border-radius: 5px; text-align: center; border: 1px solid #444; }
    .mini-label { font-size: 10px; color: #888; }
    .mini-val { font-size: 14px; color: #00FF00; font-weight: bold; }
    .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
    .bar-bg { width: 60%; height: 6px; background: #333; border-radius: 3px; margin-top: 10px; overflow: hidden; }
    .bar-fill { width: 0%; height: 100%; background: #00FF00; transition: width 0.1s; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header-controls">
    <button class="btn" onclick="activateLiveMode()">📸 即時鏡頭</button>
    <button class="btn" onclick="toggleCamera()">🔄 切換鏡頭</button>
    <label class="btn" for="upload-A">📁 影片 A</label>
    <input type="file" id="upload-A" accept="video/*" hidden onchange="handleFile(event, 'A')">
    <label class="btn" for="upload-B">📁 影片 B</label>
    <input type="file" id="upload-B" accept="video/*" hidden onchange="handleFile(event, 'B')">
    <button class="btn btn-danger" onclick="location.reload()">🔄 重設</button>
  </div>

  <div class="comparison-container">
    <div class="video-slot" id="slot-A">
      <div class="canvas-box">
        <div class="overlay" id="overlay-A"><div id="text-A" style="color:#00FF00">準備中...</div><div class="bar-bg"><div class="bar-fill" id="fill-A"></div></div></div>
        <video id="video-A" playsinline muted crossorigin="anonymous"></video>
        <canvas id="canvas-A"></canvas>
      </div>
      <input type="range" class="custom-progress hidden" id="progress-A" min="0" max="100" value="0" oninput="manualSeek('A')">
      <div class="slot-dash" id="dash-A">
        <div class="mini-card"><div class="mini-label">後手肘</div><div id="elbow-A" class="mini-val">--°</div></div>
        <div class="mini-card"><div class="mini-label">前肩</div><div id="f-shoulder-A" class="mini-val">--°</div></div>
        <div class="mini-card"><div class="mini-label">後肩</div><div id="b-shoulder-A" class="mini-val">--°</div></div>
        <div class="mini-card"><div class="mini-label">軀幹</div><div id="torso-A" class="mini-val">--°</div></div>
        <button class="btn" style="grid-column: span 2; margin-top:5px;" onclick="resetBaseline('A')">🎯 鎖定開弓基準</button>
      </div>
    </div>

    <div class="video-slot hidden" id="slot-B">
        <div class="canvas-box">
          <div class="overlay" id="overlay-B"><div id="text-B" style="color:#00FF00">準備中...</div><div class="bar-bg"><div class="bar-fill" id="fill-B"></div></div></div>
          <video id="video-B" playsinline muted crossorigin="anonymous"></video>
          <canvas id="canvas-B"></canvas>
        </div>
        <input type="range" class="custom-progress" id="progress-B" min="0" max="100" value="0" oninput="manualSeek('B')">
        <div class="slot-dash">
          <div class="mini-card"><div class="mini-label">後手肘</div><div id="elbow-B" class="mini-val">--°</div></div>
          <div class="mini-card"><div class="mini-label">前肩</div><div id="f-shoulder-B" class="mini-val">--°</div></div>
          <div class="mini-card"><div class="mini-label">後肩</div><div id="b-shoulder-B" class="mini-val">--°</div></div>
          <div class="mini-card"><div class="mini-label">軀幹</div><div id="torso-B" class="mini-val">--°</div></div>
          <button class="btn" style="grid-column: span 2; margin-top:5px;" onclick="resetBaseline('B')">🎯 鎖定開弓基準</button>
        </div>
      </div>
  </div>

  <script>
    const slots = {
      A: { vid: document.getElementById('video-A'), cvs: document.getElementById('canvas-A'), ctx: document.getElementById('canvas-A').getContext('2d'), ovl: document.getElementById('overlay-A'), fill: document.getElementById('fill-A'), prog: document.getElementById('progress-A'), lastRes: null, baseline: null },
      B: { vid: document.getElementById('video-B'), cvs: document.getElementById('canvas-B'), ctx: document.getElementById('canvas-B').getContext('2d'), ovl: document.getElementById('overlay-B'), fill: document.getElementById('fill-B'), prog: document.getElementById('progress-B'), lastRes: null, baseline: null }
    };

    let pose;
    let isLiveMode = false;
    let globalAiBusy = false;
    let currentCallbackTarget = null;
    let camera = null;
    let currentFacingMode = "environment";

    // 初始化 Pose
    async function initPose() {
      pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
      pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });
      pose.onResults((results) => {
        if (currentCallbackTarget && slots[currentCallbackTarget]) {
          slots[currentCallbackTarget].lastRes = results;
          updateMetricsUI(currentCallbackTarget, results.poseLandmarks);
        }
        globalAiBusy = false;
      });
      console.log("Pose Model Initialized");
    }

    // 計算角度邏輯
    function getAng(p1, p2, p3) {
      const rad = Math.atan2(p3.y-p2.y, p3.x-p2.x) - Math.atan2(p1.y-p2.y, p1.x-p2.x);
      let ang = Math.abs(rad * 180 / Math.PI);
      return Math.round(ang > 180 ? 360 - ang : ang);
    }

    function updateMetricsUI(id, lm) {
      if (!lm) return;
      const isR = lm[14].y < lm[13].y; 
      const drawSide = isR ? { s:12, e:14, w:16, h:24 } : { s:11, e:13, w:15, h:23 };
      const pushSide = isR ? { s:11, e:13, w:15, h:23 } : { s:12, e:14, w:16, h:24 };

      document.getElementById(`elbow-${id}`).innerText = getAng(lm[drawSide.s], lm[drawSide.e], lm[drawSide.w]) + "°";
      document.getElementById(`f-shoulder-${id}`).innerText = getAng(lm[pushSide.e], lm[pushSide.s], lm[pushSide.h]) + "°";
      document.getElementById(`b-shoulder-${id}`).innerText = getAng(lm[drawSide.e], lm[drawSide.s], lm[drawSide.h]) + "°";
      
      const sM = { x:(lm[11].x+lm[12].x)/2, y:(lm[11].y+lm[12].y)/2 };
      const hM = { x:(lm[23].x+lm[24].x)/2, y:(lm[23].y+lm[24].y)/2 };
      document.getElementById(`torso-${id}`).innerText = getAng({x:sM.x, y:0}, sM, hM) + "°";
    }

    async function handleFile(event, id) {
      isLiveMode = false;
      if (camera) { await camera.stop(); camera = null; }
      const file = event.target.files[0];
      if (!file) return;

      const slot = slots[id];
      if (id === 'B') document.getElementById('slot-B').classList.remove('hidden');
      
      slot.ovl.style.display = 'flex';
      slot.prog.classList.remove('hidden');
      slot.vid.src = URL.createObjectURL(file);
      
      // 確保影片加載
      await new Promise(r => slot.vid.onloadeddata = r);
      
      const duration = slot.vid.duration;
      // 增加步進值 (0.3s) 以減輕手機負擔，防止卡死
      for (let t = 0; t <= duration; t += 0.3) {
        slot.vid.currentTime = t;
        await new Promise(res => { slot.vid.onseeked = res; });
        
        currentCallbackTarget = id;
        globalAiBusy = true;
        await pose.send({ image: slot.vid });
        
        // 更新進度條
        const pct = Math.round((t / duration) * 100);
        slot.fill.style.width = pct + "%";
        document.getElementById(`text-${id}`).innerText = `分析中... ${pct}%`;
      }
      
      slot.ovl.style.display = 'none';
      slot.vid.currentTime = 0;
    }

    function resetBaseline(id) { alert(`已設定 ${id} 基準點`); }

    // 繪圖迴圈
    function draw() {
      ['A', 'B'].forEach(id => {
        const slot = slots[id];
        if (slot.vid.readyState >= 2) {
          slot.cvs.width = slot.vid.videoWidth;
          slot.cvs.height = slot.vid.videoHeight;
          slot.ctx.drawImage(slot.vid, 0, 0);
          
          if (slot.lastRes && slot.lastRes.poseLandmarks) {
            drawConnectors(slot.ctx, slot.lastRes.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
            drawLandmarks(slot.ctx, slot.lastRes.poseLandmarks, {color: '#FFF', radius: 1});
          }
        }
      });
      requestAnimationFrame(draw);
    }

    async function activateLiveMode() {
      isLiveMode = true;
      if (camera) await camera.stop();
      camera = new Camera(slots.A.vid, {
        onFrame: async () => {
          if (isLiveMode && !globalAiBusy) {
            globalAiBusy = true;
            currentCallbackTarget = 'A';
            await pose.send({ image: slots.A.vid });
          }
        },
        facingMode: currentFacingMode
      });
      camera.start();
    }

    window.onload = async () => { 
      await initPose(); 
      draw(); 
      activateLiveMode(); 
    };
  </script>
</body>
</html>
