<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 穩定修復版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .controls { display: flex; gap: 10px; padding: 15px; flex-wrap: wrap; justify-content: center; background: #222; width: 100%; border-bottom: 2px solid #00FF00; }
    button, label { background: #333; color: #00FF00; padding: 12px 18px; border-radius: 8px; border: 1px solid #00FF00; cursor: pointer; font-size: 14px; font-weight: bold; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 95%; max-width: 600px; margin: 15px 0; }
    .data-card { background: #2a2a2a; padding: 12px; border-radius: 10px; text-align: center; border-left: 4px solid #00FF00; }
    .data-label { font-size: 12px; color: #aaa; }
    .data-value { font-size: 20px; font-weight: bold; }
    .canvas-container { position: relative; width: 95%; max-width: 640px; }
    canvas { width: 100%; border-radius: 12px; background: #000; }
    video { display: none; }
    #upload-input { display: none; }
    .status-msg { position: absolute; top: 10px; left: 10px; font-weight: bold; color: #FF3B30; z-index: 10; font-size: 24px; }
  </style>
</head>
<body>

  <div class="controls">
    <button onclick="switchCamera()">🔄 切換鏡頭</button>
    <label for="upload-input">📁 上傳分析影片</label>
    <input type="file" id="upload-input" accept="video/*" onchange="loadVideo(event)">
    <button onclick="location.reload()">🔴 重設即時模式</button>
  </div>
  
  <div class="dashboard">
    <div class="data-card"><div class="data-label">後手肘角度</div><div id="elbow-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">開弓直線度</div><div id="align-val" class="data-value">--%</div></div>
  </div>

  <div class="canvas-container">
    <div id="release-msg" class="status-msg"></div>
    <video class="input_video" playsinline muted crossorigin="anonymous"></video>
    <canvas class="output_canvas"></canvas>
  </div>

  <script>
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const releaseMsg = document.getElementById('release-msg');
    
    let camera = null;
    let currentFacingMode = "environment";
    let lastResults = null;
    let frameCounter = 0;
    const FRAME_SKIP = 3; 

    // 初始化 Pose 模型
    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 0,
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
      lastResults = results;
      updateMetrics(results);
    });

    // 核心繪圖與分析循環
    function draw() {
      if (videoElement.paused || videoElement.ended) {
        requestAnimationFrame(draw);
        return;
      }

      // 自動調整 Canvas 尺寸以匹配影片
      if (canvasElement.width !== videoElement.videoWidth) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
      }

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);

      if (lastResults && lastResults.poseLandmarks) {
        drawConnectors(canvasCtx, lastResults.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        drawLandmarks(canvasCtx, lastResults.poseLandmarks, {color: '#FFFFFF', radius: 1});
      }
      canvasCtx.restore();

      // 每隔幾幀進行一次分析
      frameCounter++;
      if (frameCounter % FRAME_SKIP === 0) {
        pose.send({ image: videoElement });
      }

      requestAnimationFrame(draw);
    }

    function updateMetrics(results) {
      if (!results.poseLandmarks) return;
      const lm = results.poseLandmarks;
      // 簡單角度與直線計算邏輯 (略)
      document.getElementById('elbow-val').innerText = "計算中..."; 
    }

    // 關鍵修正：確保影片上傳後正確重啟流程
    async function loadVideo(event) {
      const file = event.target.files[0];
      if (!file) return;

      // 1. 停止目前的攝影機
      if (camera) {
        await camera.stop();
        camera = null;
      }

      // 2. 載入影片
      const url = URL.createObjectURL(file);
      videoElement.src = url;
      
      videoElement.onloadedmetadata = () => {
        videoElement.play();
        draw(); // 啟動繪圖循環
      };
    }

    async function startCamera() {
      camera = new Camera(videoElement, {
        onFrame: async () => { /* 交給 draw() 處理 */ },
        facingMode: currentFacingMode,
        width: 640,
        height: 480
      });
      camera.start();
      draw();
    }

    function switchCamera() {
      currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
      startCamera();
    }

    // 初始啟動
    window.onload = startCamera;
  </script>
</body>
</html>
