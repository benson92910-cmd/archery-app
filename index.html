<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 深度分析修復版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .controls { display: flex; gap: 10px; padding: 20px 10px; width: 100%; justify-content: center; }
    .btn { background: #333; color: white; padding: 10px 15px; border-radius: 8px; border: 1px solid #00FF00; cursor: pointer; font-size: 14px; }
    #upload-input { display: none; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; margin-bottom: 15px; }
    .data-card { background: #222; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #00FF00; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }
    .data-value { font-size: 24px; font-weight: bold; }
    .canvas-container { position: relative; width: 92%; max-width: 640px; border-radius: 20px; overflow: hidden; border: 2px solid #333; }
    canvas { width: 100%; display: block; background: #000; }
    video { display: none; }
    #analysis-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
    .progress-track { width: 80%; height: 8px; background: #333; border-radius: 4px; margin-top: 15px; overflow: hidden; }
    #progress-fill { width: 0%; height: 100%; background: #00FF00; box-shadow: 0 0 10px #00FF00; }
    .status-text { font-weight: bold; color: #00FF00; }
  </style>
</head>
<body>

  <div class="controls">
    <button class="btn" onclick="location.reload()">🔄 切換鏡頭</button>
    <label class="btn" for="upload-input">📁 上傳分析影片</label>
    <input type="file" id="upload-input" accept="video/*" onchange="startAnalysisFlow(event)">
    <button class="btn" onclick="location.reload()">🔴 即時模式</button>
  </div>
  
  <div class="dashboard">
    <div class="data-card"><div>後手肘角度</div><div id="elbow-val" class="data-value">--°</div></div>
    <div class="data-card"><div>軀幹垂直度</div><div id="torso-val" class="data-value">--°</div></div>
    <div class="data-card"><div>左膝角度</div><div id="lknee-val" class="data-value">--°</div></div>
    <div class="data-card"><div>右膝角度</div><div id="rknee-val" class="data-value">--°</div></div>
  </div>

  <div class="canvas-container">
    <div id="analysis-overlay">
      <div class="status-text">🔍 AI 深度分析中...</div>
      <div class="progress-track"><div id="progress-fill"></div></div>
      <div id="percent-text" style="margin-top:10px; color:#00FF00;">0%</div>
    </div>
    <video class="input_video" playsinline muted crossorigin="anonymous"></video>
    <canvas class="output_canvas"></canvas>
  </div>

  <script>
    const video = document.querySelector('.input_video');
    const canvas = document.querySelector('.output_canvas');
    const ctx = canvas.getContext('2d');
    const overlay = document.getElementById('analysis-overlay');
    const fill = document.getElementById('progress-fill');
    const percentTxt = document.getElementById('percent-text');

    let isAnalyzing = false;
    let lastResults = null;

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 0, smoothLandmarks: true });
    
    // 關鍵：將 onResults 轉化為 Promise，確保分析完才走下一步
    let resolvePose;
    pose.onResults((results) => {
      lastResults = results;
      if (results.poseLandmarks) updateUI(results.poseLandmarks);
      if (resolvePose) resolvePose(); 
    });

    function calculateAngle(a, b, c) {
      if(!a || !b || !c) return 0;
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return Math.round(angle);
    }

    function updateUI(lm) {
      const isRight = lm[14].y < lm[13].y;
      document.getElementById('elbow-val').innerText = calculateAngle(lm[isRight?12:11], lm[isRight?14:13], lm[isRight?16:15]) + "°";
      const sMid = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2 };
      const hMid = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2 };
      document.getElementById('torso-val').innerText = calculateAngle({x: sMid.x, y: 0}, sMid, hMid) + "°";
      document.getElementById('lknee-val').innerText = calculateAngle(lm[23], lm[25], lm[27]) + "°";
      document.getElementById('rknee-val').innerText = calculateAngle(lm[24], lm[26], lm[28]) + "°";
    }

    // --- 核心修正：穩定的分析循環 ---
    async function startAnalysisFlow(event) {
      const file = event.target.files[0];
      if (!file) return;

      overlay.style.display = 'flex';
      isAnalyzing = true;
      video.src = URL.createObjectURL(file);

      // 等待影片加載完畢
      await new Promise(r => video.onloadedmetadata = r);
      
      const duration = video.duration;
      let currentTime = 0;

      while (currentTime <= duration) {
        video.currentTime = currentTime;
        // 等待影片跳轉完成
        await new Promise(r => video.onseeked = r);
        
        // 執行 AI 分析並等待結果返回
        const posePromise = new Promise(r => resolvePose = r);
        await pose.send({ image: video });
        await posePromise;

        // 更新進度條
        const progress = (currentTime / duration) * 100;
        fill.style.width = progress + "%";
        percentTxt.innerText = Math.round(progress) + "%";

        currentTime += 0.2; // 這裡可以調整精度 (0.2秒一跳)
      }

      finishAnalysis();
    }

    function finishAnalysis() {
      isAnalyzing = false;
      overlay.style.display = 'none';
      video.currentTime = 0;
      video.play();
      requestAnimationFrame(renderLoop);
    }

    function renderLoop() {
      if (!video.paused && !isAnalyzing) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        if (lastResults && lastResults.poseLandmarks) {
          drawConnectors(ctx, lastResults.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
          drawLandmarks(ctx, lastResults.poseLandmarks, {color: '#FFFFFF', radius: 1});
        }
        pose.send({ image: video });
        requestAnimationFrame(renderLoop);
      }
    }

    // 初始鏡頭模式
    async function init() {
      const camera = new Camera(video, { onFrame: async () => { if(!isAnalyzing) await pose.send({image: video}); }, width: 640, height: 480 });
      camera.start();
      renderLoop();
    }
    window.onload = init;
  </script>
</body>
</html>
