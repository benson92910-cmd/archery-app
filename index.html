<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 硬體釋放版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .header-controls { padding: 10px; display: flex; gap: 8px; justify-content: center; width: 100%; background: #1a1a1a; position: sticky; top: 0; z-index: 100; }
    .btn { background: #222; color: #00FF00; padding: 10px; border-radius: 8px; border: 1px solid #00FF00; font-size: 13px; font-weight: bold; }
    .dashboard-pro { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 95%; margin: 10px 0; }
    .data-card { background: #1a1a1a; padding: 5px; border-radius: 6px; border: 1px solid #333; text-align: center; }
    .data-main { font-size: 14px; color: #00FF00; font-weight: bold; }
    .video-slot { width: 95%; max-width: 500px; background: #000; border-radius: 12px; padding: 10px; margin-bottom: 10px; }
    canvas { width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; }
    .hidden { display: none !important; }
    video { display: none; }
  </style>
</head>
<body>

  <div class="header-controls">
    <button class="btn" onclick="initCamera()">📸 開啟鏡頭</button>
    <label class="btn" for="upload-A">📁 影片 A</label>
    <input type="file" id="upload-A" hidden onchange="handleFile(event, 'A')">
    <button class="btn" onclick="location.reload()" style="color:#ff4444">🔄 重置</button>
  </div>

  <div class="dashboard-pro">
    <div class="data-card"><div>前肩</div><div id="f-shoulder-val" class="data-main">--</div></div>
    <div class="data-card"><div>後手肘</div><div id="b-elbow-val" class="data-main">--</div></div>
    <div class="data-card"><div>軀幹</div><div id="torso-val" class="data-main">--</div></div>
  </div>

  <div class="video-slot" id="slot-A">
    <canvas id="canvas-A"></canvas>
    <input type="range" id="progress-A" style="width:100%; accent-color:#00FF00" min="0" max="100" value="0" oninput="manualSeek('A')">
    <video id="video-A" playsinline muted crossorigin="anonymous"></video>
  </div>

  <script>
    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });

    let camera = null;
    let currentTarget = 'A';
    let aiBusy = false;
    let isLive = false;
    const vA = document.getElementById('video-A');
    const cA = document.getElementById('canvas-A');
    const ctxA = cA.getContext('2d');

    pose.onResults((res) => {
      if (res.poseLandmarks) {
        drawConnectors(ctxA, res.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
        updateMetrics(res.poseLandmarks);
      }
      aiBusy = false;
    });

    async function killCamera() {
      isLive = false;
      if (camera) {
        await camera.stop();
        camera = null;
      }
      if (vA.srcObject) {
        vA.srcObject.getTracks().forEach(t => t.stop());
        vA.srcObject = null;
      }
      vA.load(); // 重置影片元件
    }

    async function initCamera() {
      await killCamera();
      isLive = true;
      camera = new Camera(vA, {
        onFrame: async () => {
          if (isLive && !aiBusy) {
            aiBusy = true;
            await pose.send({ image: vA });
          }
        }, width: 640, height: 480
      });
      camera.start();
    }

    async function handleFile(event, id) {
      await killCamera(); // 確保相機完全釋放
      const file = event.target.files[0];
      if (!file) return;

      const url = URL.createObjectURL(file);
      vA.src = url;
      
      vA.onloadedmetadata = () => {
        vA.currentTime = 0.1; // 跳過可能黑屏的第一幀
      };

      vA.onseeked = async () => {
        if (!isLive && !aiBusy) {
          aiBusy = true;
          await pose.send({ image: vA });
        }
      };
    }

    function manualSeek() {
      const prog = document.getElementById('progress-A');
      if (vA.duration) {
        vA.currentTime = (prog.value / 100) * vA.duration;
      }
    }

    function updateMetrics(lm) {
      const getAng = (p1, p2, p3) => {
        const rad = Math.atan2(p3.y-p2.y, p3.x-p2.x) - Math.atan2(p1.y-p2.y, p1.x-p2.x);
        let ang = Math.abs(rad * 180 / Math.PI);
        return (ang > 180 ? 360 - ang : ang).toFixed(1);
      };
      document.getElementById('f-shoulder-val').innerText = getAng(lm[23], lm[11], lm[13]) + "°";
      document.getElementById('b-elbow-val').innerText = getAng(lm[12], lm[14], lm[16]) + "°";
      document.getElementById('torso-val').innerText = getAng({x:lm[11].x, y:0}, lm[11], lm[23]) + "°";
    }

    function draw() {
      if (vA.readyState >= 2) {
        cA.width = vA.videoWidth;
        cA.height = vA.videoHeight;
        ctxA.drawImage(vA, 0, 0);
        // 播放中自動分析
        if (!vA.paused && !aiBusy && Math.floor(vA.currentTime * 10) % 3 === 0) {
          aiBusy = true;
          pose.send({ image: vA });
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
