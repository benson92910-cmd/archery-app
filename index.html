<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 高幀率整合版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
    .controls { display: flex; gap: 8px; padding: 15px 5px; width: 100%; justify-content: center; flex-wrap: wrap; }
    .btn { background: #222; color: #00FF00; padding: 10px 12px; border-radius: 8px; border: 1px solid #00FF00; cursor: pointer; font-size: 13px; font-weight: bold; text-decoration: none; border-style: solid; }
    #upload-input { display: none; }
    
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; margin-bottom: 15px; }
    .data-card { background: #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #00FF00; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }
    .data-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .data-value { font-size: 22px; font-weight: bold; color: #fff; }

    .canvas-container { position: relative; width: 92%; max-width: 640px; border-radius: 15px; overflow: hidden; border: 1px solid #333; background: #000; aspect-ratio: 9/16; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    video { display: none; }

    #analysis-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); display: none; flex-direction: column;
      justify-content: center; align-items: center; z-index: 100;
    }
    .progress-track { width: 70%; height: 8px; background: #333; border-radius: 4px; margin-top: 15px; overflow: hidden; border: 1px solid #444; }
    #progress-fill { width: 0%; height: 100%; background: #00FF00; box-shadow: 0 0 15px #00FF00; transition: width 0.05s; }
  </style>
</head>
<body>

  <div class="controls">
    <button class="btn" onclick="toggleCamera()">🔄 切換鏡頭</button>
    <label class="btn" for="upload-input">📁 上傳影片 (高FPS分析)</label>
    <input type="file" id="upload-input" accept="video/*" onchange="handleFileUpload(event)">
    <button class="btn" onclick="resetToLive()"><span style="color:#ff4444">●</span> 即時模式</button>
  </div>
  
  <div class="dashboard">
    <div class="data-card"><div class="data-label">後手肘角度</div><div id="elbow-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">軀幹垂直度</div><div id="torso-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">左膝角度</div><div id="lknee-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">右膝角度</div><div id="rknee-val" class="data-value">--°</div></div>
  </div>

  <div class="canvas-container">
    <div id="analysis-overlay">
      <div style="color:#00FF00; font-weight:bold; font-size: 18px;">🔍 AI 高頻採樣分析中...</div>
      <div class="progress-track"><div id="progress-fill"></div></div>
      <div id="percent-text" style="margin-top:10px; color:#00FF00; font-family: monospace; font-size: 20px;">0%</div>
      <div style="margin-top:5px; color:#666; font-size: 11px;">正在以 30 FPS 提取動作細節</div>
    </div>
    <video id="input_video" playsinline muted crossorigin="anonymous"></video>
    <canvas id="output_canvas"></canvas>
  </div>

  <script>
    const videoElement = document.getElementById('input_video');
    const canvasElement = document.getElementById('output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const overlay = document.getElementById('analysis-overlay');
    const progressFill = document.getElementById('progress-fill');
    const percentText = document.getElementById('percent-text');

    let camera = null;
    let isAnalyzing = false;
    let lastPoseResults = null;
    let currentFacingMode = "environment"; 

    // --- 1. Pose 模型配置 ---
    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1, 
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });
    
    pose.onResults((results) => {
      lastPoseResults = results;
      if (results.poseLandmarks) {
        updateMetrics(results.poseLandmarks);
      }
    });

    // --- 2. 核心運算 ---
    function getAngle(p1, p2, p3) {
      if(!p1 || !p2 || !p3) return 0;
      const rad = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
      let ang = Math.abs(rad * 180 / Math.PI);
      return Math.round(ang > 180 ? 360 - ang : ang);
    }

    function updateMetrics(lm) {
      const isRight = lm[14].y < lm[13].y;
      document.getElementById('elbow-val').innerText = getAngle(lm[isRight?12:11], lm[isRight?14:13], lm[isRight?16:15]) + "°";
      
      const sMid = { x:(lm[11].x+lm[12].x)/2, y:(lm[11].y+lm[12].y)/2 };
      const hMid = { x:(lm[23].x+lm[24].x)/2, y:(lm[23].y+lm[24].y)/2 };
      document.getElementById('torso-val').innerText = getAngle({x:sMid.x, y:0}, sMid, hMid) + "°";
      
      document.getElementById('lknee-val').innerText = getAngle(lm[23], lm[25], lm[27]) + "°";
      document.getElementById('rknee-val').innerText = getAngle(lm[24], lm[26], lm[28]) + "°";
    }

    // --- 3. 影片與鏡頭管理 ---
    async function startApp() {
      if (camera) await camera.stop();
      camera = new Camera(videoElement, {
        onFrame: async () => {
          if (!isAnalyzing && videoElement.srcObject) {
            await pose.send({ image: videoElement });
          }
        },
        facingMode: currentFacingMode,
        width: 640, height: 480
      });
      camera.start();
    }

    async function toggleCamera() {
      currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
      videoElement.src = "";
      videoElement.srcObject = null;
      await startApp();
    }

    function resetToLive() {
      location.reload();
    }

    // --- 4. 高幀率影片分析邏輯 ---
    async function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      if (camera) { await camera.stop(); camera = null; }

      isAnalyzing = true;
      overlay.style.display = 'flex';
      
      const url = URL.createObjectURL(file);
      videoElement.srcObject = null;
      videoElement.src = url;
      videoElement.load();

      await new Promise(r => videoElement.onloadeddata = r);
      
      const duration = videoElement.duration;
      const targetFPS = 30; // 提高至 30 FPS
      const step = 1 / targetFPS; 

      for (let t = 0; t <= duration; t += step) {
        videoElement.currentTime = t;
        
        // 等待 Seek 完成
        await new Promise(resolve => {
          const onSeeked = () => {
            videoElement.removeEventListener('seeked', onSeeked);
            resolve();
          };
          videoElement.addEventListener('seeked', onSeeked);
        });

        // Await AI 運算結果
        await pose.send({ image: videoElement });
        
        // 更新進度 (每隔幾幀更新一次文字以減少 DOM 負擔)
        const progress = (t / duration) * 100;
        progressFill.style.width = progress + "%";
        if (Math.round(t / step) % 10 === 0) {
          percentText.innerText = Math.round(progress) + "%";
        }
      }

      isAnalyzing = false;
      overlay.style.display = 'none';
      videoElement.currentTime = 0;
      videoElement.play();
      
      playLoop();
    }

    async function playLoop() {
      if (!isAnalyzing && !videoElement.paused && !videoElement.ended && !videoElement.srcObject) {
        await pose.send({ image: videoElement });
      }
      requestAnimationFrame(playLoop);
    }

    function mainLoop() {
      if (videoElement.readyState >= 2) {
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        
        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
        
        if (lastPoseResults && lastPoseResults.poseLandmarks) {
          drawConnectors(canvasCtx, lastPoseResults.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
          drawLandmarks(canvasCtx, lastPoseResults.poseLandmarks, {color: '#FFFFFF', radius: 1});
        }
        canvasCtx.restore();
      }
      requestAnimationFrame(mainLoop);
    }

    window.onload = () => {
      startApp();
      mainLoop();
    };
  </script>
</body>
</html>
