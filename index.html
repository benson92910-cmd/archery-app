<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭全方位分析 Pro - 穩定版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .controls { display: flex; gap: 8px; padding: 10px; flex-wrap: wrap; justify-content: center; background: #222; width: 100%; position: sticky; top: 0; z-index: 10; }
    button, label { background: #444; color: white; padding: 10px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: bold; }
    button:active { background: #666; }
    .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 95%; max-width: 600px; margin: 10px 0; }
    .data-card { background: #333; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid #00FF00; }
    .data-label { font-size: 11px; color: #aaa; margin-bottom: 4px; }
    .data-value { font-size: 18px; font-weight: bold; }
    .canvas-container { position: relative; width: 95%; max-width: 640px; }
    canvas { width: 100%; border-radius: 10px; border: 1px solid #444; background: #000; }
    video { display: none; }
    #upload-input { display: none; }
    .loading-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); padding: 10px; border-radius: 5px; display: none; }
  </style>
</head>
<body>
  <div class="controls">
    <button onclick="switchCamera()">🔄 切換鏡頭</button>
    <label for="upload-input">📁 上傳影片</label>
    <input type="file" id="upload-input" accept="video/*" onchange="loadVideo(event)">
    <button onclick="location.reload()">🔴 重置/即時相機</button>
  </div>
  
  <div class="dashboard">
    <div class="data-card"><div class="data-label">後手肘角度</div><div id="elbow-val" class="data-value">--°</div></div>
    <div class="data-card"><div class="data-label">軀幹垂直度</div><div id="torso-val" class="data-value">--°</div></div>
  </div>

  <div class="canvas-container">
    <video class="input_video" playsinline muted></video>
    <canvas class="output_canvas"></canvas>
    <div id="loading" class="loading-overlay">分析中...</div>
  </div>

  <script>
    const videoElement = document.querySelector('.input_video');
    const canvasElement = document.querySelector('.output_canvas');
    const canvasCtx = canvasElement.getContext('2d');
    const loadingDiv = document.getElementById('loading');
    
    let camera = null;
    let currentFacingMode = "environment";
    let isVideoMode = false;

    // 1. 角度計算工具
    function calculateAngle(a, b, c) {
      if(!a || !b || !c) return 0;
      const radians = Math.atan2(c.y - b.y, c.x - b.x) - Math.atan2(a.y - b.y, a.x - b.x);
      let angle = Math.abs(radians * 180.0 / Math.PI);
      if (angle > 180.0) angle = 360 - angle;
      return angle;
    }

    // 2. 初始化 MediaPipe Pose
    const pose = new Pose({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
    });

    pose.setOptions({
      modelComplexity: 1, // 手機建議設為 1，兼顧速度與準度
      smoothLandmarks: true,
      minDetectionConfidence: 0.5,
      minTrackingConfidence: 0.5
    });

    pose.onResults((results) => {
      canvasElement.width = videoElement.videoWidth || 640;
      canvasElement.height = videoElement.videoHeight || 480;

      canvasCtx.save();
      canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
      canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

      if (results.poseLandmarks) {
        const lm = results.poseLandmarks;
        
        // 分析邏輯：後手肘 (12, 14, 16) 與 軀幹 (肩中點/髖中點)
        const elbow = calculateAngle(lm[12], lm[14], lm[16]);
        document.getElementById('elbow-val').innerText = Math.round(elbow) + "°";

        const sMid = { x: (lm[11].x + lm[12].x)/2, y: (lm[11].y + lm[12].y)/2 };
        const hMid = { x: (lm[23].x + lm[24].x)/2, y: (lm[23].y + lm[24].y)/2 };
        const torso = calculateAngle(sMid, hMid, {x: hMid.x, y: 0});
        document.getElementById('torso-val').innerText = Math.round(torso) + "°";

        drawConnectors(canvasCtx, lm, POSE_CONNECTIONS, {color: '#FFFFFF', lineWidth: 2});
        drawLandmarks(canvasCtx, lm, {color: '#00FF00', lineWidth: 1, radius: 3});
      }
      canvasCtx.restore();
    });

    // 3. 穩定的影格處理函式 (解決卡頓關鍵)
    async function processFrame() {
      if (videoElement.paused || videoElement.ended) {
        isVideoMode = false;
        return;
      }
      // 等待 MediaPipe 處理完這一幀
      await pose.send({ image: videoElement });
      // 請求下一幀處理
      requestAnimationFrame(processFrame);
    }

    // 4. 相機控制
    function startCamera() {
      isVideoMode = false;
      if (camera) camera.stop();
      camera = new Camera(videoElement, {
        onFrame: async () => {
          if(!isVideoMode) await pose.send({image: videoElement});
        },
        facingMode: currentFacingMode,
        width: 640, height: 480
      });
      camera.start();
    }

    function switchCamera() {
      currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
      startCamera();
    }

    // 5. 影片上傳處理
    async function loadVideo(event) {
      const file = event.target.files[0];
      if (!file) return;

      isVideoMode = true;
      if (camera) await camera.stop();

      loadingDiv.style.display = "block";
      const url = URL.createObjectURL(file);
      videoElement.src = url;
      
      videoElement.onloadeddata = () => {
        loadingDiv.style.display = "none";
        videoElement.play();
        processFrame(); // 開始手動遞迴處理
      };
    }

    // 初始啟動
    startCamera();
  </script>
</body>
</html>
