<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>射箭 Pro AI - 自動偵測與偏差分析版</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils"></script>
  <style>
    body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
    .header-controls { padding: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; background: #1a1a1a; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
    .btn { background: #222; color: #00FF00; padding: 8px 12px; border-radius: 6px; border: 1px solid #00FF00; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
    .btn-lock { background: #CC0000; color: white; border-color: #FF0000; }
    .btn-locked { background: #FF8800 !important; border-color: #FFAA00 !important; }
    
    .dashboard-pro { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; width: 95%; max-width: 600px; margin: 15px 0; }
    .data-card { background: #1a1a1a; padding: 8px; border-radius: 8px; border: 1px solid #333; text-align: center; }
    .data-label { font-size: 10px; color: #888; margin-bottom: 2px; }
    .data-main { font-size: 16px; font-weight: bold; color: #00FF00; }
    .data-delta { font-size: 11px; font-weight: bold; margin-top: 2px; }
    .delta-stable { color: #00FF00; }
    .delta-warn { color: #FF4444; }

    .comparison-container { display: flex; gap: 10px; width: 95%; max-width: 1200px; flex-wrap: wrap; justify-content: center; }
    .video-slot { flex: 1; min-width: 300px; max-width: 500px; background: #1a1a1a; border-radius: 12px; padding: 10px; border: 1px solid #333; position: relative; }
    .canvas-box { position: relative; width: 100%; aspect-ratio: 9/16; background: #000; border-radius: 8px; overflow: hidden; }
    canvas { width: 100%; height: 100%; object-fit: contain; }
    video { display: none; }
    .custom-progress { width: 100%; margin: 10px 0; accent-color: #00FF00; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="header-controls">
    <button class="btn" onclick="activateLiveMode()">📸 即時鏡頭</button>
    <label class="btn" for="upload-A">📁 影片 A</label>
    <input type="file" id="upload-A" hidden onchange="handleFile(event, 'A')">
    <button id="lock-btn" class="btn btn-lock" onclick="toggleLock()">🔒 鎖定定位點 (測偏差)</button>
    <button class="btn" onclick="location.reload()" style="color:#ff4444; border-color:#ff4444">🔄 重置</button>
  </div>

  <div class="dashboard-pro">
    <div class="data-card"><div class="data-label">前肩</div><div id="f-shoulder-val" class="data-main">--</div><div id="f-shoulder-delta" class="data-delta"></div></div>
    <div class="data-card"><div class="data-label">前手肘</div><div id="f-elbow-val" class="data-main">--</div><div id="f-elbow-delta" class="data-delta"></div></div>
    <div class="data-card"><div class="data-label">後肩</div><div id="b-shoulder-val" class="data-main">--</div><div id="b-shoulder-delta" class="data-delta"></div></div>
    <div class="data-card"><div class="data-label">後手肘</div><div id="b-elbow-val" class="data-main">--</div><div id="b-elbow-delta" class="data-delta"></div></div>
    <div class="data-card"><div class="data-label">軀幹垂直</div><div id="torso-val" class="data-main">--</div><div id="torso-delta" class="data-delta"></div></div>
    <div class="data-card"><div class="data-label">髖部水平</div><div id="hip-val" class="data-main">--</div><div id="hip-delta" class="data-delta"></div></div>
  </div>

  <div class="comparison-container">
    <div class="video-slot" id="slot-A">
      <div class="canvas-box"><canvas id="canvas-A"></canvas></div>
      <input type="range" id="progress-A" class="custom-progress hidden" min="0" max="100" value="0" oninput="manualSeek('A')">
      <video id="video-A" playsinline muted crossorigin="anonymous"></video>
    </div>
  </div>

  <script>
    const slots = {
      A: { vid: document.getElementById('video-A'), cvs: document.getElementById('canvas-A'), ctx: document.getElementById('canvas-A').getContext('2d'), prog: document.getElementById('progress-A'), lastRes: null }
    };

    const pose = new Pose({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}` });
    pose.setOptions({ modelComplexity: 1, smoothLandmarks: true });

    let isLocked = false;
    let baseline = null;
    let globalAiBusy = false;
    let currentCallbackTarget = null;
    let lastElbowX = null; // 用於偵測放箭

    pose.onResults((results) => {
      if (currentCallbackTarget && slots[currentCallbackTarget]) {
        slots[currentCallbackTarget].lastRes = results;
        if (currentCallbackTarget === 'A' && results.poseLandmarks) {
          processArcheryLogic(results.poseLandmarks);
        }
      }
      globalAiBusy = false;
    });

    function getAngle(p1, p2, p3) {
      if (!p1 || !p2 || !p3) return 0;
      const rad = Math.atan2(p3.y - p2.y, p3.x - p2.x) - Math.atan2(p1.y - p2.y, p1.x - p2.x);
      let ang = Math.abs(rad * 180 / Math.PI);
      return ang > 180 ? 360 - ang : ang;
    }

    function processArcheryLogic(lm) {
      // 1. 自動判斷左/右手持弓 (根據手腕 X 座標)
      const isLeftHandForward = lm[15].x < lm[16].x;
      
      // 定義關鍵點
      const fS = isLeftHandForward ? 11 : 12; // 前肩
      const fE = isLeftHandForward ? 13 : 14; // 前手肘
      const fW = isLeftHandForward ? 15 : 16; // 前手腕
      const bS = isLeftHandForward ? 12 : 11; // 後肩
      const bE = isLeftHandForward ? 14 : 13; // 後手肘
      const bW = isLeftHandForward ? 16 : 15; // 後手腕
      const fH = isLeftHandForward ? 23 : 24; // 前髖
      const bH = isLeftHandForward ? 24 : 23; // 後髖

      // 2. 計算六大核心角度
      const currentAngles = {
        'f-shoulder': getAngle(lm[fH], lm[fS], lm[fE]),
        'f-elbow': getAngle(lm[fS], lm[fE], lm[fW]),
        'b-shoulder': getAngle(lm[bH], lm[bS], lm[bE]),
        'b-elbow': getAngle(lm[bS], lm[bE], lm[bW]),
        'torso': getAngle({x: lm[fS].x, y: 0}, lm[fS], lm[fH]), // 軀幹與垂直線
        'hip': getAngle(lm[23], {x: (lm[23].x + lm[24].x)/2, y: lm[23].y}, lm[24]) // 髖部水平度
      };

      // 3. 自動偵測放箭 (後手肘 X 軸突然向後位移)
      if (!isLocked) {
        if (lastElbowX !== null) {
          const moveSpeed = isLeftHandForward ? (lm[bE].x - lastElbowX) : (lastElbowX - lm[bE].x);
          if (moveSpeed > 0.05) { // 放箭閾值
            console.log("偵測到放箭！");
            toggleLock(true);
          }
        }
        lastElbowX = lm[bE].x;
      }

      // 4. 更新 UI 與 Δ Delta 計算
      for (let key in currentAngles) {
        const val = currentAngles[key].toFixed(1);
        document.getElementById(`${key}-val`).innerText = val + "°";
        
        if (isLocked && baseline) {
          const delta = (currentAngles[key] - baseline[key]).toFixed(1);
          const deltaEl = document.getElementById(`${key}-delta`);
          deltaEl.innerText = `Δ ${delta > 0 ? '+' : ''}${delta}°`;
          deltaEl.className = Math.abs(delta) > 3 ? 'data-delta delta-warn' : 'data-delta delta-stable';
        } else {
          document.getElementById(`${key}-delta`).innerText = "";
        }
      }

      // 5. 如果未鎖定，持續更新基準值供下一影格比對（或點擊鎖定時抓取最後一份）
      if (!isLocked) baseline = { ...currentAngles };
    }

    function toggleLock(auto = false) {
      isLocked = !isLocked;
      const btn = document.getElementById('lock-btn');
      if (isLocked) {
        btn.innerText = auto ? "🎯 放箭已偵測 (鎖定中)" : "🔓 解除鎖定";
        btn.classList.add('btn-locked');
      } else {
        btn.innerText = "🔒 鎖定定位點 (測偏差)";
        btn.classList.remove('btn-locked');
        lastElbowX = null; 
      }
    }

    // --- 以下為原有的穩定播放邏輯 ---
    async function activateLiveMode() {
      globalAiBusy = false; currentCallbackTarget = 'A';
      const camera = new Camera(slots.A.vid, {
        onFrame: async () => {
          if (!globalAiBusy) {
            globalAiBusy = true;
            await pose.send({ image: slots.A.vid });
          }
        }, width: 640, height: 480
      });
      camera.start();
    }

    async function handleFile(event, id) {
      const file = event.target.files[0];
      if (!file) return;
      const slot = slots[id];
      slot.prog.classList.remove('hidden');
      slot.vid.src = URL.createObjectURL(file);
      slot.vid.onloadeddata = () => { slot.vid.play(); };
    }

    async function manualSeek(id) {
      const slot = slots[id];
      slot.vid.currentTime = (slot.prog.value / 100) * slot.vid.duration;
      if (!globalAiBusy) {
        globalAiBusy = true; currentCallbackTarget = id;
        await pose.send({ image: slot.vid });
      }
    }

    function draw() {
      const slot = slots.A;
      if (slot.vid.readyState >= 2) {
        slot.cvs.width = slot.vid.videoWidth;
        slot.cvs.height = slot.vid.videoHeight;
        slot.ctx.drawImage(slot.vid, 0, 0);
        if (slot.lastRes && slot.lastRes.poseLandmarks) {
          drawConnectors(slot.ctx, slot.lastRes.poseLandmarks, POSE_CONNECTIONS, {color: '#00FF00', lineWidth: 2});
          drawLandmarks(slot.ctx, slot.lastRes.poseLandmarks, {color: '#FFFFFF', radius: 1});
        }
        if (!slot.vid.paused) {
          slot.prog.value = (slot.vid.currentTime / slot.vid.duration) * 100;
          if (!globalAiBusy) {
            globalAiBusy = true; currentCallbackTarget = 'A';
            pose.send({ image: slot.vid });
          }
        }
      }
      requestAnimationFrame(draw);
    }
    window.onload = () => { draw(); activateLiveMode(); };
  </script>
</body>
</html>
